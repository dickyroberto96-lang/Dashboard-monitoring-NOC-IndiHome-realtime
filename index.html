    <script>
        // Fungsi Jam Berdetak secara Live
        function startLiveClock() {
            setInterval(() => {
                if (window.parent && window.parent.__activeTab && window.parent.__activeTab !== 'app4') return;
                document.getElementById('current-time').innerText = "Live: " + new Date().toLocaleString('id-ID') + " | Auto-Refresh Aktif";
            }, 1000);
        }

        // Fungsi parsing CSV sederhana namun kuat (menangani koma di dalam tanda kutip)
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (let l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret;
        }

        // Fetch data langsung dari GDocs dengan parameter isFirstLoad agar tidak berkedip saat auto-refresh
        let isLoadingTeknik = false;
        let lastTeknikLoad = 0;
        let allTeknikRows = [];
        let visibleTeknikRows = [];
        let ticketModalRows = [];
        let ticketModalSource = null;
        const DEFAULT_FILTER = { sa: 'ALL', sektor: 'ALL', sto: 'ALL' };

        function uniqSorted(values) {
            return [...new Set(values.filter(Boolean).map(v => v.toString().trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
        }

        function fillSelectOptions(selectId, values, placeholder) {
            const select = document.getElementById(selectId);
            if (!select) return;
            const current = select.value || 'ALL';
            select.innerHTML = `<option value="ALL">${placeholder}</option>` + values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
            select.value = values.includes(current) ? current : 'ALL';
        }

        function escapeHtml(value) {
            return (value ?? '').toString()
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getTicketLabel(row) {
            return row.ticketNo || row.noTiket || row.noTicket || row.no_tiket || '-';
        }

        function setFilterOptions(dataRows) {
            const areas = uniqSorted(dataRows.map(r => r.area));
            const sectors = uniqSorted(dataRows.map(r => r.sektor));
            const stos = uniqSorted(dataRows.map(r => r.sto));
            fillSelectOptions('saFilter', areas, 'Semua Service Area');
            fillSelectOptions('sektorFilter', sectors, 'Semua Sektor');
            fillSelectOptions('stoFilter', stos, 'Semua STO');
        }

        function getCurrentTeknikFilter() {
            return {
                sa: document.getElementById('saFilter')?.value || 'ALL',
                sektor: document.getElementById('sektorFilter')?.value || 'ALL',
                sto: document.getElementById('stoFilter')?.value || 'ALL'
            };
        }

        function applyTeknikFilter() {
            const { sa, sektor, sto } = getCurrentTeknikFilter();
            const filtered = allTeknikRows.filter(row => {
                const okSa = sa === 'ALL' || row.area === sa;
                const okSektor = sektor === 'ALL' || row.sektor === sektor;
                const okSto = sto === 'ALL' || row.sto === sto;
                return okSa && okSektor && okSto;
            });
            visibleTeknikRows = filtered;
            renderTable(filtered);
            updateGrandTotal(filtered);
        }

        async function copyCanvasToDownload(canvas, fileName) {
            return new Promise((resolve, reject) => {
                canvas.toBlob((blob) => {
                    if (!blob) return reject(new Error('Canvas kosong'));
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                    resolve();
                }, 'image/png');
            });
        }

        async function downloadTeknikTablePNG() {
            const el = document.getElementById('prodCard');
            if (!el || typeof html2canvas === 'undefined') return;

            const clone = el.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.left = '-10000px';
            clone.style.top = '0';
            clone.style.height = 'auto';
            clone.style.maxHeight = 'none';
            clone.style.overflow = 'visible';
            clone.style.width = el.scrollWidth + 'px';
            document.body.appendChild(clone);

            const canvas = await html2canvas(clone, {
                scale: 4,
                useCORS: true,
                backgroundColor: '#ffffff',
                scrollX: 0,
                scrollY: 0,
                windowWidth: clone.scrollWidth,
                windowHeight: clone.scrollHeight
            });
            clone.remove();
            await copyCanvasToDownload(canvas, `Produktifitas_Teknisi_UltraHD_${new Date().toISOString().slice(0,10)}.png`);
        }

        function exportTeknikToExcel() {
            const rows = (visibleTeknikRows.length ? visibleTeknikRows : allTeknikRows).map(row => ({
                'SERVICE AREA': row.area,
                'SEKTOR': row.sektor,
                'STO': row.sto,
                'TEKNISI 1': row.teknisi1,
                'TEKNISI 2': row.teknisi2,
                'JLH TEK': row.jlh,
                'DIAMOND TO': row.categories[0]?.to || 0,
                'DIAMOND TC': row.categories[0]?.tc || 0,
                'PLATINUM TO': row.categories[1]?.to || 0,
                'PLATINUM TC': row.categories[1]?.tc || 0,
                'MANJA TO': row.categories[2]?.to || 0,
                'MANJA TC': row.categories[2]?.tc || 0,
                'NON HVC TO': row.categories[3]?.to || 0,
                'NON HVC TC': row.categories[3]?.tc || 0,
                'SQM TO': row.categories[4]?.to || 0,
                'SQM TC': row.categories[4]?.tc || 0,
                'UNDERSPEC TO': row.categories[5]?.to || 0,
                'UNDERSPEC TC': row.categories[5]?.tc || 0,
                'Z PERMINTAAN TO': row.categories[6]?.to || 0,
                'Z PERMINTAAN TC': row.categories[6]?.tc || 0,
                'TOTAL OPEN': row.totalOpen,
                'TOTAL CLOSE': row.totalClose,
                'TGT PROD': row.tgtProd,
                'PROD TEKNISI': row.prodTeknisi,
                'ACH PROD': row.achProd
            }));
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Produktifitas');
            XLSX.writeFile(wb, `Produktifitas_Teknisi_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function openTicketModalCategory(rowIndex, catIndex, status) {
            const row = visibleTeknikRows[rowIndex];
            if (!row || !row.tickets || row.tickets.length === 0) return;
            
            const catNames = ['DIAMOND', 'PLATINUM', 'MANJA', 'NON HVC', 'SQM', 'UNDERSPEC', 'Z_PERMINTAAN'];
            const targetCat = catIndex !== null ? catNames[catIndex] : null;
            
            let filteredTickets = row.tickets;
            
            // Filter berdasarkan Kategori (Jika diklik dari kolom kategori spesifik)
            if (targetCat) {
                filteredTickets = filteredTickets.filter(t => t.category === targetCat);
            }
            
            // Filter berdasarkan Status OPEN / CLOSE
            if (status) {
                filteredTickets = filteredTickets.filter(t => t.status === status);
            }
            
            // Jangan buka modal jika sel yang diklik nilainya 0
            if (filteredTickets.length === 0) {
                alert("Tidak ada tiket pada kategori ini.");
                return; 
            }
            
            ticketModalRows = filteredTickets;
            ticketModalSource = row;
            
            const modal = document.getElementById('ticketModal');
            const title = document.getElementById('ticketModalTitle');
            const sub = document.getElementById('ticketModalSub');
            const meta = document.getElementById('ticketModalMeta');
            
            let titleHTML = `Detail Tiket — ${row.area} / ${row.sektor} / ${row.sto}`;
            if (targetCat && status) {
                 titleHTML += ` <span class="text-blue-600">➔ ${targetCat} (${status})</span>`;
            } else if (status) {
                 titleHTML += ` <span class="text-blue-600">➔ TOTAL ${status}</span>`;
            } else {
                 titleHTML += ` <span class="text-blue-600">➔ SEMUA TIKET</span>`;
            }
            
            title.innerHTML = titleHTML;
            sub.innerText = `${row.teknisi1}${row.teknisi2 ? ' & ' + row.teknisi2 : ''}`;
            meta.innerText = `Menampilkan: ${filteredTickets.length} Tiket (Dari Total ${row.tickets.length} Tiket Teknisi Ini)`;
            
            renderTicketModalTable(filteredTickets);
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeTicketModal() {
            const modal = document.getElementById('ticketModal');
            if (!modal) return;
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function renderTicketModalTable(rows) {
            const tbody = document.getElementById('ticketModalTbody');

                tbody.innerHTML = `<tr><td colspan="9" class="px-4 py-6 text-center font-bold text-slate-500">Tidak ada tiket untuk baris ini.</td></tr>`;

            });
            clone.remove();
            await copyCanvasToDownload(canvas, `Detail_Tiket_UltraHD_${new Date().toISOString().slice(0,10)}.png`);
        }


        async function loadData(isFirstLoad = false) {
            if (window.parent && window.parent.__activeTab && window.parent.__activeTab !== 'app4') return;
            if (isLoadingTeknik) return;
            if (!isFirstLoad && lastTeknikLoad && (Date.now() - lastTeknikLoad) < 15000) return;

            isLoadingTeknik = true;
            const tbody = document.getElementById('table-body');
            
            // Tampilkan pesan loading hanya saat pertama kali halaman dibuka
            if (isFirstLoad) {
                tbody.innerHTML = '<tr><td colspan="25" class="py-6 text-center font-bold text-gray-500">Membaca data secara langsung dari Google Sheets...</td></tr>';
            }

            // PERBAIKAN 1: Menggunakan URL Backend yang baru dan seragam dengan menu utama
            const BACKEND_URL = 'https://script.google.com/macros/s/AKfycby3xJxVLmEWmlEox69yCCVB44PiZbfCRg3GHOECC5D8DYg1-NLO6SXhLoqUoxsZ2KQ/exec';
            const LOGIN_TOKEN_KEY = 'dashboard_login_token';

            async function backendGetCsv(sheetName) {
                // Menggunakan cache terpusat (Anti-Lelet) dari Dashboard Utama jika tersedia
                if (window.parent && typeof window.parent.__antiLeletFetch === 'function') {
                    try {
                        return await window.parent.__antiLeletFetch({ action: 'getCsv', sheet: sheetName });
                    } catch(e) {}
                }
                // Fallback fetch langsung
                const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
                const res = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'getCsv', token, sheet: sheetName })
                });
                return await res.json();
            }

            // Fungsi pembantu agar jika satu sheet tidak ada, sheet lain tetap termuat dengan aman
            async function fetchSheetAsJSON(sheetName) {
                try {
                    const response = await backendGetCsv(sheetName);
                    if (!response || !response.success || !response.csv) return [];
                    const rows = parseCSV(response.csv);
                    if(rows.length < 1) return [];

                    // AUTO-DETECT HEADER: Bypass baris judul kosong di atas tabel G-Sheets
                    let headerRowIndex = 0;
                    for(let i = 0; i < Math.min(10, rows.length); i++) {
                        const rowStr = rows[i].join('').toUpperCase();
                        if(rowStr.includes('NAMA') || rowStr.includes('STO') || rowStr.includes('TEKNISI') || rowStr.includes('NIK') || rowStr.includes('TIKET') || rowStr.includes('INCIDENT')) {
                            headerRowIndex = i;
                            break;
                        }
                    }

                    const headers = rows[headerRowIndex];
                    const data = [];
                    for(let i = headerRowIndex + 1; i < rows.length; i++) {
                        if (!rows[i].some(cell => cell && cell.trim() !== '')) continue; // Skip baris kosong
                        let obj = {};
                        for(let j = 0; j < headers.length; j++) {
                            let headerName = headers[j] ? headers[j].trim() : `COL_${j}`;
                            if (headerName) obj[headerName] = rows[i][j] || "";
                        }
                        data.push(obj);
                    }
                    return data;
                } catch (e) {
                    console.warn(`Gagal memuat sheet: ${sheetName}`, e);
                    return [];
                }
            }

            try {
                // Fetch seluruh sheet secara paralel tanpa saling menggagalkan
                const [allData] = await Promise.all([
                    fetchSheetAsJSON('DATADB')
                ]);

                if (!allData || allData.length === 0) throw new Error('Semua data kosong');

                processData(allData);
                lastTeknikLoad = Date.now();

            } catch (error) {
                console.error('Error fetching data:', error);
                if (isFirstLoad) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="25" class="py-6 text-center font-bold text-red-600 bg-red-50">
                                Gagal memuat data dari Google Sheets.<br>
                                <span class="text-sm font-normal text-black">Pastikan opsi Berbagi (Share) di Google Sheet Anda telah diatur menjadi <b>"Siapa saja yang memiliki link" (Anyone with the link can view)</b> agar data dapat dibaca.</span>
                            </td>
                        </tr>`;
                }
            } finally {
                isLoadingTeknik = false;
            }
        }

        // ====== STANDARISASI: MENYAMAKAN PERATURAN DENGAN DASHBOARD UTAMA ======
        function normalizeRawData(data) {
            if (!Array.isArray(data)) return [];
            const normalized = data.map(row => {
                const newRow = { ...row }; 
                Object.keys(row).forEach(k => {
                    let val = row[k];
                    if (val === null || val === undefined || val === "") return;
                    let cleanK = k.toUpperCase().trim().replace(/[^A-Z0-9]/g, '');
                    if(cleanK.includes('JAMCUSTASSIGN') || cleanK.includes('WAKTUASSIGN')) newRow["JAM CUST ASSIGN"] = val;
                    else if(cleanK.includes('JAMTECHCLOSE') || cleanK.includes('AMTECHCLOSE') || cleanK.includes('JAMCLOSE') || cleanK.includes('WAKTUCLOSE') || cleanK.includes('TGLCLOSE') || cleanK.includes('DATEKCLOSE')) newRow["JAM TECH CLOSED"] = val;
                    else if(cleanK.includes('DURASICLOSE') || cleanK.includes('DURASI')) newRow["DURASI CLOSE"] = val;
                    else if(cleanK.includes('DATEK') || cleanK.includes('REPORTDATE') || cleanK.includes('TGLLAPOR') || cleanK === 'TANGGAL') { newRow["REPORT DATE"] = val; newRow["DATEK"] = val; }
                    else if(cleanK.includes('NOTIKET') || cleanK.includes('INCIDENT') || cleanK === 'IN' || cleanK === 'TIKET') { newRow["NOTIKET"] = val; newRow["NO TIKET"] = val; }
                    else if(cleanK.includes('STATUSTIKET') || cleanK === 'STATUS') newRow["STATUS TIKET"] = val;
                    else if(cleanK.includes('KATEGORI')) newRow["KATEGORI TTR"] = val;
                    else if(cleanK.includes('CUSTASSIGN') || cleanK.includes('CUSTOMER') || cleanK === 'ASSIGN') newRow["CUST ASSIGN"] = val;
                    else if(cleanK.includes('TIPETIKET') || cleanK === 'TIPE') newRow["TIPE TIKET"] = val;
                    else if(cleanK.includes('DETAIL') || cleanK.includes('KETERANGAN') || cleanK.includes('SUMMARY')) { newRow["DETAIL TIKET"] = val; newRow["KETERANGAN"] = val; }
                    else if(cleanK.includes('FLAGHVC') || cleanK === 'HVC' || cleanK.includes('PRIORITAS')) newRow["FLAG HVC"] = val;
                    else if(cleanK === 'SLA') newRow["SLA"] = val;
                    else if(cleanK.includes('NOJASTEL') || cleanK.includes('NOMORINET') || cleanK === 'INET' || cleanK.includes('SPEEDY') || cleanK === 'POTS') newRow["NOMOR INET"] = val;
                    else if(cleanK === 'TEKNISI1' || cleanK.includes('TEKNISIUTAMA') || cleanK === 'TEKNISI') newRow["TEKNISI 1"] = val;
                    else if(cleanK === 'TEKNISI2' || cleanK.includes('PENDAMPING')) newRow["TEKNISI 2"] = val;
                    else if(cleanK === 'STO' || cleanK.includes('LOKASI')) newRow["STO"] = val;
                    else if(cleanK === 'SEKTOR' || cleanK === 'SECTOR') newRow["SEKTOR"] = val;
                    else if(cleanK.includes('SERVICEAREA') || cleanK === 'SA') newRow["SERVICE AREA"] = val;
                    else if(cleanK.includes('STATUSKENDALA') || cleanK === 'KENDALA') newRow["STATUS KENDALA"] = val;
                    else if(cleanK.includes('ANALISA') || cleanK.includes('PENYEBAB')) newRow["ANALISA PENYEBAB GANGGUAN"] = val;
                });
                return newRow;
            });
            return normalized.filter(r => {
                const noTiket = r["NO TIKET"] || r["NOTIKET"] || "";
                const noInet = r["NOMOR INET"] || r["INET"] || "";
                return noTiket.toString().trim() !== "" || noInet.toString().trim() !== "";
            });
        }

        function isTicketOpen(r) {
            const s = (r["STATUS TIKET"] || "").toString().toUpperCase().trim();
            return s !== "CLOSE" && s !== "CLOSED"; 
        }

        function getTicketBucket(r) {
            const kt = (r["KATEGORI TTR"] || "").toString().toUpperCase().trim();
            const c = (r["CUST ASSIGN"] || "").toString().toUpperCase().trim();
            const tipe = (r["TIPE TIKET"] || r["TIPE"] || "").toString().toUpperCase().trim();
            const detail = (r["DETAIL TIKET"] || r["KETERANGAN"] || "").toString().toUpperCase().trim();
            const v = (r["FLAG HVC"] || r["FLAG_HVC"] || "").toString().toUpperCase();

            if (c.includes("Z_PERMINTAAN") || c.includes("Z PERMINTAAN") || kt.includes("Z_PERMINTAAN") || detail.includes("Z_PERMINTAAN")) return "Z_PERMINTAAN";
            if (c.includes("SQM") || kt.includes("SQM") || detail.includes("SQM")) return "SQM";
            if (c.includes("UNDERSPEC") || kt.includes("UNDERSPEC") || tipe.includes("UNDERSPEC") || detail.includes("UNDERSPEC") || c.includes("USPEC")) return "UNDERSPEC";
            if (kt.includes("MANJA") || c.includes("TTR 3 JM") || c.includes("TTR 3JM")) return "MANJA";
            if (v.includes("DIAMOND") || c.includes("TTR 3 JD") || c.includes("TTR 3JD") || detail.includes("DIAMOND")) return "DIAMOND";
            if (v.includes("PLATINUM") || c.includes("TTR 6 JP") || c.includes("TTR 6JP") || detail.includes("PLATINUM")) return "PLATINUM";
            
            return "NON HVC";
        }

        const SA_MAP = {
            'ARK': 'ARENGKA', 'PBRC 1': 'PBR BARAT', 'PBRC 2': 'PBR BARAT', 'PBRC 3': 'PBR TIMUR', 'PBRC 4': 'PBR TIMUR',
            'BKR': 'BUKIT RAYA', 'SAK': 'BUKIT RAYA', 'SEA': 'BUKIT RAYA', 'BKN': 'BUKIT RAYA', 'UBT': 'BUKIT RAYA', 'PPN': 'BUKIT RAYA', 'SGP': 'BUKIT RAYA',
            'SLJ': 'DUMAI', 'DUM': 'DUMAI', 'BAG': 'DUMAI', 'BAS': 'DUMAI', 'DRI': 'DUMAI', 'BGU': 'DUMAI',
            'RBI': 'PANGKALAN KERINCI', 'PKR': 'PANGKALAN KERINCI', 'PWG': 'PANGKALAN KERINCI', 'SOK': 'PANGKALAN KERINCI', 'MIS': 'PANGKALAN KERINCI',
            'AMK': 'RENGAT', 'KLE': 'RENGAT', 'PMB': 'RENGAT', 'RGT': 'RENGAT', 'TBH': 'RENGAT', 'TAK': 'RENGAT', 'PNP': 'RENGAT'
        };

        function norm(v) { return (v || "").toString().toUpperCase().replace(/\s+/g, "").replace(/-/g, ""); }
        function mapSTO(val) { 
            let n = norm(val); 
            if(n.includes("PBRC") || n === "PBB") return "PBR"; 
            let res = (val || "").toString().toUpperCase();
            if(res === "KDS" || n === "KDS") return "MIS";
            if(res === "PBB") return "PBR";
            return res; 
        }

        function getSA(r) {
            let st = mapSTO(r.STO || r.LOKASI);
            let sek = (r.SEKTOR || "").toUpperCase().replace(/\s/g, '');
            if (sek.includes("PBRC1") || sek.includes("PBB1") || sek.includes("PBRC2") || sek.includes("PBB2")) return "PBR BARAT";
            if (sek.includes("PBRC3") || sek.includes("PBB3") || sek.includes("PBRC4") || sek.includes("PBB4")) return "PBR TIMUR";
            if (st === 'PBR') return "PBR BARAT";
            if (st === 'ARK' || sek.includes("ARK")) return "ARENGKA";
            return SA_MAP[st] || "OTHER";
        }

        // Memproses baris mentah CSV ke dalam objek kelompok Data (Berdasarkan Teknisi)
        function processData(combinedData) {
            const normalizedData = normalizeRawData(combinedData);
            const groups = {};
            
            normalizedData.forEach(r => {
                let stoRaw = r.STO ? r.STO.trim().toUpperCase() : "UNKNOWN";
                let sektorRaw = r.SEKTOR ? r.SEKTOR.trim().toUpperCase() : "UNKNOWN";
                let noInternet = r["NOMOR INET"] || r.INET || "-";
                let t1 = (r["TEKNISI 1"] || "").trim();
                let t2 = (r["TEKNISI 2"] || "").trim();
                let isClose = !isTicketOpen(r);
                let bkt = getTicketBucket(r);

                if (!sektorRaw || sektorRaw === 'SEKTOR' || sektorRaw === 'MIN') sektorRaw = "UNKNOWN";
                if (!stoRaw) stoRaw = "UNKNOWN";
                
                if (t1 === '0' || t1 === '-') t1 = '';
                if (t2 === '0' || t2 === '-') t2 = '';
                if (t1 === t2) t2 = '';
                if (!t1 && t2) { t1 = t2; t2 = ''; }
                
                let jlhTek = (t1 && t2) ? 2 : (!t1 && !t2 ? 0 : 1);
                if (!t1 && !t2) t1 = "BELUM ASSIGN";

                const sUpper = sektorRaw.replace(/\s/g, '');
                if (sUpper.includes('PBRC1') || sUpper.includes('PBB1')) stoRaw = 'PBRC 1';
                else if (sUpper.includes('PBRC2') || sUpper.includes('PBB2')) stoRaw = 'PBRC 2';
                else if (sUpper.includes('PBRC3') || sUpper.includes('PBB3')) stoRaw = 'PBRC 3';
                else if (sUpper.includes('PBRC4') || sUpper.includes('PBB4')) stoRaw = 'PBRC 4';
                else if (stoRaw === 'PBR') stoRaw = 'PBRC 1';
                
                let sa = getSA(r);
                let key = (t1 === "BELUM ASSIGN") ? "BELUM ASSIGN" : [t1, t2].filter(x => x).sort().join('|');
                
                if(!groups[key]) {
                    groups[key] = {
                        area: sa, sektor: finalSektor, sto: finalSto, teknisi1: t1, teknisi2: t2, jlh: jlhTek, 
                        categories: Array(7).fill(null).map(() => ({to: 0, tc: 0})),
                        tickets: []
                    };
                } else {
                    if (groups[key].sto === '-' && finalSto !== '-') {
                        groups[key].area = serviceArea;
                        groups[key].sektor = finalSektor;
                        groups[key].sto = finalSto;
                    }
                }
                
                let catIndex = 3; // NON HVC default
                if (bkt === 'DIAMOND') catIndex = 0;
                else if (bkt === 'PLATINUM') catIndex = 1;
                else if (bkt === 'MANJA') catIndex = 2;
                else if (bkt === 'NON HVC') catIndex = 3;
                else if (bkt === 'SQM') catIndex = 4;
                else if (bkt === 'UNDERSPEC') catIndex = 5;
                else if (bkt === 'Z_PERMINTAAN') catIndex = 6;

                if (isClose) {
                    groups[key].categories[catIndex].tc++;
                } else {
                    groups[key].categories[catIndex].to++;
                }

                const catNames = ['DIAMOND', 'PLATINUM', 'MANJA', 'NON HVC', 'SQM', 'UNDERSPEC', 'Z_PERMINTAAN'];
                groups[key].tickets.push({
                    noTiket: r["NO TIKET"] || r.NOTIKET || '-',
                    status: isClose ? 'CLOSE' : 'OPEN',
                    category: catNames[catIndex] || 'REGULER',
                    noInternet: noInternet,
                    serviceArea: sa,
                    sektor: sektorRaw,
                    sto: stoRaw,
                    teknisi1: t1,
                    teknisi2: t2
                });
            });

            // Ubah objek Grup menjadi Array, dan hitung formula produktifitas
            const dataRows = Object.values(groups).map(group => {
                let totalOpen = 0;
                let totalClose = 0;
                group.categories.forEach(cat => {
                    totalOpen += cat.to;
                    totalClose += cat.tc;
                });
                
                let tgtProd = group.jlh * 4; // TGT = 8 untuk 2 orang, 4 untuk 1 orang, 0 untuk teknisi kosong
                let prodTeknisi = group.jlh > 0 ? (totalClose / group.jlh) : 0; // Hindari pembagian 0
                let achProd = tgtProd > 0 ? (totalClose / tgtProd) * 100 : 0;

                return {
                    ...group,
                    totalOpen,
                    totalClose,
                    tgtProd,
                    prodTeknisi: prodTeknisi.toLocaleString('id-ID', {maximumFractionDigits: 2}),
                    achProd: achProd.toLocaleString('id-ID', {maximumFractionDigits: 2}) + '%'
                };
            });

            // Urutkan berdasarkan Service Area, kemudian SEKTOR, kemudian STO, kemudian Teknisi 1
            dataRows.sort((a, b) => {
                if (a.area !== b.area) return a.area.localeCompare(b.area);
                if (a.sektor !== b.sektor) return a.sektor.localeCompare(b.sektor);
                if (a.sto !== b.sto) return a.sto.localeCompare(b.sto);
                return a.teknisi1.localeCompare(b.teknisi1);
            });

            allTeknikRows = dataRows;
            if (!visibleTeknikRows.length) visibleTeknikRows = dataRows;

            setFilterOptions(dataRows);
            applyTeknikFilter();
        }

        // Render data ke dalam HTML
        function renderTable(dataRows) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            dataRows.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = "ticket-row hover:bg-gray-100 cursor-pointer";
                tr.title = "Klik untuk melihat daftar keseluruhan tiket teknisi ini";
                tr.setAttribute("onclick", `openTicketModalCategory(${index}, null, null)`);

                let htmlContent = `
                    <td class="text-left px-2 py-1">${row.area}</td>
                    <td class="px-2 py-1">${row.sektor}</td>
                    <td class="px-2 py-1">${row.sto}</td>
                    <td class="text-left px-2 py-1">${row.teknisi1}</td>
                    <td class="text-left px-2 py-1">${row.teknisi2}</td>
                    <td class="bg-[#d9e1f2] font-semibold">${row.jlh}</td>
                `;

                row.categories.forEach((cat, catIndex) => {
                    const toBg = cat.to > 0 ? 'bg-yellow-50 text-black cursor-pointer hover:bg-yellow-200' : 'text-slate-400 cursor-pointer hover:bg-gray-200'; 
                    const tcBg = cat.tc > 0 ? 'bg-red-50 text-black cursor-pointer hover:bg-red-200' : 'text-slate-400 cursor-pointer hover:bg-gray-200';
                    htmlContent += `
                        <td class="${toBg}" onclick="event.stopPropagation(); openTicketModalCategory(${index}, ${catIndex}, 'OPEN')" title="Lihat ${cat.to} Tiket OPEN">${cat.to}</td>
                        <td class="${tcBg}" onclick="event.stopPropagation(); openTicketModalCategory(${index}, ${catIndex}, 'CLOSE')" title="Lihat ${cat.tc} Tiket CLOSE">${cat.tc}</td>
                    `;
                });

                // Set warna ACH PROD persis seperti ketentuan sebelumnya
                let achStr = row.achProd.replace('%', '').replace(',', '.');
                let achValue = parseFloat(achStr);
                let achBgColor = "font-semibold ";

                if (achValue >= 0 && achValue <= 50) {
                    achBgColor += "bg-red-600 text-white"; // Merah
                } else if (achValue > 50 && achValue <= 75) {
                    achBgColor += "bg-orange-500 text-white"; // Oren
                } else if (achValue > 75 && achValue <= 99.99) {
                    achBgColor += "bg-green-400 text-black"; // Hijau Muda
                } else if (achValue >= 100) {
                    achBgColor += "bg-green-700 text-white"; // Hijau Pekat
                } else {
                    achBgColor += "bg-gray-500 text-white";
                }

                htmlContent += `
                    <td class="bg-gray-100 font-bold cursor-pointer hover:bg-blue-100" onclick="event.stopPropagation(); openTicketModalCategory(${index}, null, 'OPEN')" title="Lihat Total ${row.totalOpen} Tiket OPEN">${row.totalOpen}</td>
                    <td class="bg-gray-100 font-bold cursor-pointer hover:bg-blue-100" onclick="event.stopPropagation(); openTicketModalCategory(${index}, null, 'CLOSE')" title="Lihat Total ${row.totalClose} Tiket CLOSE">${row.totalClose}</td>
                    <td>${row.tgtProd}</td>
                    <td>${row.prodTeknisi}</td>
                    <td class="${achBgColor}">${row.achProd}</td>
                `;

                tr.innerHTML = htmlContent;
                tbody.appendChild(tr);
            });
        }

        // Update Grand Total secara Dinamis berdasarkan data fetch
        function updateGrandTotal(dataRows) {
            let gtJlh = 0, gtOpen = 0, gtClose = 0, gtTgt = 0;
            let gtCat = Array(7).fill(null).map(() => ({to: 0, tc: 0}));

            dataRows.forEach(row => {
                gtJlh += row.jlh;
                row.categories.forEach((cat, i) => {
                    gtCat[i].to += cat.to;
                    gtCat[i].tc += cat.tc;
                });
                gtOpen += row.totalOpen;
                gtClose += row.totalClose;
                gtTgt += row.tgtProd;
            });

            let gtProdTeknisi = gtJlh > 0 ? (gtClose / gtJlh) : 0;
            let gtAchProd = gtTgt > 0 ? ((gtClose / gtTgt) * 100) : 0;

            document.getElementById('gt-jlh').innerText = gtJlh;
            
            const catIds = ['dia', 'pla', 'man', 'non', 'sqm', 'und', 'zpe'];
            catIds.forEach((id, i) => {
                document.getElementById(`gt-${id}-to`).innerText = gtCat[i].to;
                document.getElementById(`gt-${id}-tc`).innerText = gtCat[i].tc;
            });

            document.getElementById('gt-open').innerText = gtOpen;
            document.getElementById('gt-close').innerText = gtClose;
            document.getElementById('gt-tgt').innerText = gtTgt;
            document.getElementById('gt-prod-tek').innerText = gtProdTeknisi.toLocaleString('id-ID', {maximumFractionDigits: 2});
            
            const gtAchEl = document.getElementById('ach-grand-total');
            gtAchEl.innerText = gtAchProd.toLocaleString('id-ID', {maximumFractionDigits: 2}) + '%';

            const setTxt = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
            setTxt('sum-jlh', gtJlh);
            setTxt('sum-open', gtOpen);
            setTxt('sum-close', gtClose);
            setTxt('sum-tgt', gtTgt);
            setTxt('sum-prod', gtProdTeknisi.toLocaleString('id-ID', {maximumFractionDigits: 2}));
            setTxt('sum-ach', gtAchProd.toLocaleString('id-ID', {maximumFractionDigits: 2}) + '%');

            // Memberikan warna dinamis pada ACH PROD Grand Total
            let achBgColorGT = "font-semibold py-1 ";
            if (gtAchProd >= 0 && gtAchProd <= 50) {
                achBgColorGT += "bg-red-600 text-white";
            } else if (gtAchProd > 50 && gtAchProd <= 75) {
                achBgColorGT += "bg-orange-500 text-white";
            } else if (gtAchProd > 75 && gtAchProd <= 99.99) {
                achBgColorGT += "bg-green-400 text-black";
            } else if (gtAchProd >= 100) {
                achBgColorGT += "bg-green-700 text-white";
            } else {
                achBgColorGT += "bg-gray-500 text-white";
            }
            gtAchEl.className = achBgColorGT;
        }

        // Panggil saat halaman pertama kali diload
        loadData(true);
        startLiveClock();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeTicketModal();
        });

        // Interval untuk melakukan Auto Refresh setiap 30 detik (30000 milidetik)
        setInterval(() => {
            if (window.parent && window.parent.__activeTab && window.parent.__activeTab !== 'app4') return;
            loadData(false);
        }, 30000);

    </script>
</body>
</html>
  </template>

  <script>
    const loaded = { app1: false, app2: false, app3: false, app4: false };
    window.__activeTab = 'app1';

    function injectSrcDoc(frameId, tplId) {
      const frame = document.getElementById(frameId);
      const tpl = document.getElementById(tplId);
      if (!frame || !tpl) return;
      frame.srcdoc = tpl.innerHTML;
    }

    function setActiveButton(activeId) {
      const btn1 = document.getElementById('btnApp1');
      const btn2 = document.getElementById('btnApp2');
      if (btn1 && btn2) {
        if (activeId === 'app1') {
          btn1.classList.add('active');
          btn2.classList.remove('active');
        } else {
          btn2.classList.add('active');
          btn1.classList.remove('active');
        }
      }
    }

    function switchTab(id) {
      const panel1 = document.getElementById('panel1');
      const panel2 = document.getElementById('panel2');
      const panel3 = document.getElementById('panel3');
      const panel4 = document.getElementById('panel4');

      const panels = { app1: panel1, app2: panel2, app3: panel3, app4: panel4 };

      Object.values(panels).forEach(panel => {
        if (panel) panel.classList.add('hidden');
      });

      const activePanel = panels[id];
      if (activePanel) activePanel.classList.remove('hidden');

      setActiveButton(id);
      window.__activeTab = id;

      if (!loaded[id]) {
        if (id === 'app1') injectSrcDoc('frame1', 'tpl1');
        if (id === 'app2') injectSrcDoc('frame2', 'tpl2');
        if (id === 'app3') injectSrcDoc('frame3', 'tpl3');
        if (id === 'app4') injectSrcDoc('frame4', 'tpl4');
        loaded[id] = true;
      }
    }


    // --- LOGIKA LOGIN DENGAN OBFUSCATION SEDERHANA ---
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycby3xJxVLmEWmlEox69yCCVB44PiZbfCRg3GHOECC5D8DYg1-NLO6SXhLoqUoxsZ2KQ/exec';
    const LOGIN_TOKEN_KEY = 'dashboard_login_token';

    async function apiRequest(payload) {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function verifyBackendToken(token) {
      if (!token) return false;
      try {
        const data = await apiRequest({ action: 'verifyToken', token });
        return !!(data && data.success);
      } catch (e) {
        return false;
      }
    }

    async function checkLoginStatus() {
      const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
      if (!token) {
        document.getElementById('loginOverlay').style.display = 'flex';
        return;
      }

      const ok = await verifyBackendToken(token);
      if (ok) {
        document.getElementById('loginOverlay').style.display = 'none';
        switchTab('app1');
      } else {
        localStorage.removeItem(LOGIN_TOKEN_KEY);
        document.getElementById('loginOverlay').style.display = 'flex';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const pwd = document.getElementById('loginPassword').value.trim();
      const err = document.getElementById('loginError');
      err.classList.add('hidden');

      try {
        const data = await apiRequest({ action: 'login', password: pwd });
        if (!data.success) {
          err.classList.remove('hidden');
          document.getElementById('loginPassword').value = '';
          return;
        }

        localStorage.setItem(LOGIN_TOKEN_KEY, data.token);
        document.getElementById('loginOverlay').style.display = 'none';
        switchTab('app1');
      } catch (e) {
        console.error(e);
        err.classList.remove('hidden');
      }
    }

    async function backendGetSheet(sheetName) {
      const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
      return await apiRequest({ action: 'getData', token, sheet: sheetName });
    }

    async function backendGetCsv(sheetName) {
      const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
      return await apiRequest({ action: 'getCsv', token, sheet: sheetName });
    }

    // ============================================================
    // 🚀 ANTI-LELET SYSTEM — Centralized Cache & Request Manager
    // ============================================================
    // Dipanggil oleh semua iframe (tpl1, tpl2, dst.) lewat window.parent.__antiLeletFetch()
    // Implements: Memory Cache + localStorage Persistence + Request Deduplication + SWR

    const __AL = {
      mem: {},                        // { key: { data, ts } }
      inflight: {},                   // { key: Promise }   — dedup in-flight
      MEM_TTL:  90 * 1000,            // 90 detik — data "segar" di memori
      LS_TTL:   8 * 60 * 1000,        // 8 menit — data "segar" di localStorage
      LS_PREFIX: '__al2_',

      _lsKey(payload) {
        // buat key aman tanpa token (token berubah tiap sesi)
        const { action, sheet } = payload;
        return this.LS_PREFIX + btoa(unescape(encodeURIComponent(action + '|' + (sheet||'')))).replace(/=/g,'');
      },

      _memKey(payload) {
        return (payload.action||'') + '|' + (payload.sheet||'');
      },

      // Baca dari localStorage — return null jika expired/tidak ada
      lsRead(payload) {
        try {
          const raw = localStorage.getItem(this._lsKey(payload));
          if (!raw) return null;
          const { data, ts } = JSON.parse(raw);
          if (Date.now() - ts > this.LS_TTL) return null;
          return { data, ts };
        } catch(e) { return null; }
      },

      // Tulis ke localStorage (fire-and-forget, jangan crash jika penuh)
      lsWrite(payload, data) {
        try {
          localStorage.setItem(this._lsKey(payload), JSON.stringify({ data, ts: Date.now() }));
        } catch(e) {}
      },

      // Hapus cache spesifik (manual invalidate)
      invalidate(sheetName) {
        const key = 'getCsv|' + (sheetName || '');
        delete this.mem[key];
        delete this.inflight[key];
        try { localStorage.removeItem(this._lsKey({ action: 'getCsv', sheet: sheetName })); } catch(e) {}
      },

      // ——— CORE: Cached Fetch ———
      async fetch(payload) {
        const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
        const fullPayload = { ...payload, token };
        const key = this._memKey(payload);
        const now = Date.now();

        // 1. Memori masih segar → langsung return
        if (this.mem[key] && (now - this.mem[key].ts) < this.MEM_TTL) {
          return this.mem[key].data;
        }

        // 2. Deduplicate in-flight requests
        if (this.inflight[key]) {
          return this.inflight[key];
        }

        // 3. Ada data stale di memori → langsung return stale, fetch di background
        if (this.mem[key]) {
          this._bgRefresh(fullPayload, key);
          return this.mem[key].data;
        }

        // 4. Cek localStorage → serve instantly, lalu background refresh
        const cached = this.lsRead(payload);
        if (cached) {
          this.mem[key] = cached; // pre-populate memori
          this._bgRefresh(fullPayload, key);
          return cached.data;
        }

        // 5. Full fetch (tidak ada cache sama sekali)
        return this._doFetch(fullPayload, key);
      },

      // Background refresh — update cache tanpa blocking caller
      _bgRefresh(fullPayload, key) {
        if (this.inflight[key]) return;
        this._doFetch(fullPayload, key).catch(() => {});
      },

      // Actual HTTP fetch + populate cache
      async _doFetch(fullPayload, key) {
        const p = (async () => {
          const res = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(fullPayload)
          });
          const data = await res.json();
          // Update mem + localStorage
          this.mem[key] = { data, ts: Date.now() };
          this.lsWrite(fullPayload, data);
          return data;
        })().finally(() => {
          delete this.inflight[key];
        });
        this.inflight[key] = p;
        return p;
      }
    };

    // Expose ke iframe children
    window.__antiLeletFetch = (payload) => __AL.fetch(payload);
    window.__antiLeletInvalidate = (sheet) => __AL.invalidate(sheet);
    // ============================================================

    setTimeout(() => checkLoginStatus(), 50);
  </script>
