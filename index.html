<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Monitoring</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { min-height: 100%; }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    .topbar {
      background: linear-gradient(90deg, #1d4ed8, #2563eb, #4f46e5);
      color: white;
      box-shadow: 0 6px 24px rgba(15, 23, 42, .12);
      position: sticky;
      top: 0;
      z-index: 60;
    }
    .tab-btn {
      position: relative;
      padding: 10px 16px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1;
      transition: all .18s ease;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .tab-btn:hover { transform: translateY(-1px); }
    .tab-btn.active {
      background: rgba(255,255,255,.96);
      color: #1d4ed8;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
    }
    .frame-wrap {
      height: calc(100dvh - 72px);
      background: #e2e8f0;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: white;
    }
    .hidden { display: none; }
    .badge {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(10px);
    }
    @media (max-width: 640px) {
      .topbar {
        min-height: 64px;
        padding-top: .5rem;
        padding-bottom: .5rem;
      }
      .topbar .tab-btn {
        font-size: 12px;
        padding: 8px 12px;
        border-radius: 12px;
      }
      .frame-wrap {
        height: calc(100dvh - 64px);
      }
      iframe {
        min-height: calc(100dvh - 64px);
      }
    }
  </style>
</head>
<body>

  <!-- ==================== LOGIN OVERLAY ==================== -->
  <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-[9999] flex flex-col items-center justify-center transition-opacity duration-500" style="display: none;">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center transform transition-transform scale-100 mx-4">
      <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border border-blue-200">
        <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
      </div>
      <h2 class="text-3xl font-black text-slate-800 mb-2">Login Dashboard</h2>
      <p class="text-slate-500 text-sm mb-8">Silakan masukkan password untuk mengakses dashboard kawal assurance.</p>

      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <input type="password" id="loginPassword" placeholder="Masukkan Password..." class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all text-center text-xl tracking-[0.25em]" required>
        </div>
        <p id="loginError" class="text-rose-500 text-sm font-bold hidden animate-pulse bg-rose-50 py-2 rounded-lg border border-rose-200">Password Salah!</p>
        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-black py-3.5 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all hover:-translate-y-0.5">
          MASUK
        </button>
      </form>
    </div>
  </div>
  <!-- ======================================================= -->

  <div class="topbar px-3 sm:px-4 md:px-6 min-h-[72px] py-2 flex items-center justify-end gap-4">
    <div class="flex items-center gap-2 overflow-x-auto flex-wrap justify-end">
      <button id="btnApp1" class="tab-btn active" onclick="switchTab('app1')">
        Dashboard Tiket Gangguan
      </button>
      <button id="btnApp2"
  class="tab-btn font-extrabold px-4 py-2 rounded-xl shadow-md"
  style="background:#FFFF33; color:#000;"
  onclick="switchTab('app2')">

  ⚠️ Warning !!! Belum Order
</button>
    </div>
  </div>

  <div class="frame-wrap">
    <div id="panel1" class="w-full h-full min-h-[calc(100dvh-72px)]">
      <iframe id="frame1" title="Dashboard Tiket Gangguan"></iframe>
    </div>
    <div id="panel2" class="w-full h-full min-h-[calc(100dvh-72px)] hidden">
      <iframe id="frame2" title="Warning !!! Belum Order"></iframe>
    </div>
    <div id="panel3" class="w-full h-full min-h-[calc(100dvh-72px)] hidden">
      <iframe id="frame3" title="Analisa Penyebab Gangguan"></iframe>
    </div>
    <div id="panel4" class="w-full h-full min-h-[calc(100dvh-72px)] hidden">
      <iframe id="frame4" title="Produktifitas Teknisi Assurance Ridar"></iframe>
    </div>
  </div>

  <template id="tpl1">
<!DOCTYPE html>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Matrix Table Sticky Styles */
        .sticky-col { 
            position: sticky !important; 
            left: 0; 
            z-index: 30 !important; 
            background-clip: padding-box;
        }
        
        /* Mengamankan layer header matriks agar selalu lengket di atas (beku) */
        #reportTableWrapper thead,
        .sticky-header {
            position: sticky !important;
            top: 0;
            z-index: 50 !important;
        }
        @keyframes icon-float-pulse {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 2px rgba(52, 211, 153, 0.4)); color: #a7f3d0; }
            50% { transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 8px rgba(52, 211, 153, 0.9)); color: #ffffff; }
        }
        .anim-icon-float {
            animation: icon-float-pulse 2.5s ease-in-out infinite;
        }

        /* Animasi Floating untuk Logo */
        @keyframes float-logo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-float-logo {
            animation: float-logo 3.5s ease-in-out infinite;
        }

        @media (max-width: 767px) {
            body {
                overflow-x: hidden;
            }

            .animate-float-logo {
                animation: none;
            }

            #kpiMainView {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }

            #rincianHarianView .grid {
                grid-template-columns: 1fr;
            }

            #distributionCards {
                grid-template-columns: 1fr;
            }

            #grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }

            #aiInsightsView {
                grid-template-columns: 1fr;
            }

            #monitoringView .bg-white,
            #standardView .bg-white,
            #kehadiranCard,
            #matrixCard {
                border-radius: 1rem;
            }

            #reportTableWrapper,
            #tableKehadiranWrapper {
                max-height: 70dvh;
                -webkit-overflow-scrolling: touch;
            }

            #modal .bg-white {
                max-height: 100dvh;
                border-radius: 1rem;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            #kpiMainView {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            #grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body class="bg-slate-50 bg-[radial-gradient(#cbd5e1_1px,transparent_1px)] [background-size:24px_24px] text-slate-800 font-sans min-h-screen selection:bg-blue-500/30 overflow-x-hidden">

<!-- Secret Zone untuk Generate Export Full secara Background (Diubah agar tidak pakai opacity yang merusak warna Excel) -->
<div id="secretExportZone" style="position: absolute; left: -10000px; top: -10000px; width: 1920px; z-index: -100;"></div>

<div class="flex flex-col md:flex-row min-h-screen relative z-10 overflow-hidden">
    
    <!-- SIDEBAR KIRI (FLEX SPACER + FIXED ASIDE) -->

        <!-- The Clean Figma Sidebar (Fixed untuk mencegah scroll ganda, tapi mengikuti lebar spacer di atasnya) -->

                <!-- DITAMBAHKAN CLASS: animate-float-logo dan group/logo -->
                <div class="animate-float-logo w-12 h-12 md:group-hover/sidebar:w-44 md:group-hover/sidebar:h-44 relative z-10 flex-shrink-0 rounded-2xl md:group-hover/sidebar:rounded-[2rem] overflow-hidden border border-white shadow-sm bg-white/50 backdrop-blur-sm transition-all duration-500 mx-auto group/logo">
                    <!-- Logo menggunakan gambar perisai (DITAMBAHKAN transition-transform dan scale) -->
                    <img id="appLogo" src="https://i.ibb.co.com/xt5qkBGX/Gemini-Generated-Image-vq6l4avq6l4avq6l.png" alt="Logo Kawal Assurance" class="w-full h-full object-cover scale-[1.05] transition-transform duration-700 group-hover/logo:scale-110" onerror="this.onerror=null; this.src='https://placehold.co/200x200/1e40af/ffffff?text=KA';">
                </div>
            </div>
            
            <!-- Memaksa area nav tetap 280px dan hanya terpotong (overflow) sehingga teks tulisan tidak rusak -->

                <div class="text-sm font-black text-slate-500 uppercase tracking-widest mb-4 px-1 text-center md:group-hover/sidebar:text-left transition-all">
                    <span class="md:hidden md:group-hover/sidebar:inline whitespace-nowrap">MAIN MENU</span>
                    <span class="hidden md:inline md:group-hover/sidebar:hidden">...</span>
                </div>
                <nav class="space-y-3" id="sidebarNav"></nav>
            </div>
        </aside>
    </div>

    <!-- KONTEN UTAMA (min-w-0 agar tabel mau mengecil otomatis) -->
    <main class="flex-1 min-w-0 w-full p-4 md:p-6 lg:p-8">
        <div class="w-full max-w-[90rem] mx-auto">
            
            <!-- HEADER & AREA FILTER -->
            <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 mb-8 bg-white/80 backdrop-blur-md p-6 rounded-2xl shadow-sm border border-slate-200/60 ring-1 ring-slate-900/5 relative z-20">
                <div>
                    <h2 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight" id="mainDashboardTitle">Dashboard All Tiket</h2>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Monitoring Harian Progres Tiket & Pergerakan Teknisi</p>

                <div class="flex flex-col sm:flex-row items-center gap-4 w-full xl:w-auto flex-wrap justify-end">
                    
                    <!-- NEW EXPORT FULL BUTTON -->

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>

                    <!-- NEW AI INSIGHT BUTTON -->

                        <div class="relative w-full sm:w-56">

                                    <option value="DUMAI">Branch Dumai</option>

                            </div>
                        </div>
                    </div>
                    <!-- NOTIFIKASI SYNC — Klik untuk Force Refresh (Anti-Lelet: clear cache & reload) -->
                    <div id="syncStatus" title="Klik untuk force refresh data" onclick="(function(){ _lastLoadTs=0; if(window.parent&&window.parent.__antiLeletInvalidate){window.parent.__antiLeletInvalidate('DATADB');window.parent.__antiLeletInvalidate('DB TEKNISI');} Object.keys(_LOCAL_CSV_CACHE).forEach(k=>delete _LOCAL_CSV_CACHE[k]); load(); })()" class="cursor-pointer flex items-center justify-center gap-2 text-emerald-700 font-bold bg-emerald-50 px-4 py-2.5 rounded-full shadow-sm border border-emerald-200 text-xs w-full sm:w-auto whitespace-nowrap transition-colors">

const LOGIN_TOKEN_KEY = 'dashboard_login_token';

async function apiRequest(payload) {
    const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
    });
    return await res.json();
}

async function backendGetSheet(sheetName) {
    const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
    return await apiRequest({ action: 'getData', token, sheet: sheetName });
}

// ——— Anti-Lelet: Gunakan cache terpusat di parent frame jika tersedia ———
async function backendGetCsv(sheetName) {
    // Coba pakai centralized cache dari outer shell (cross-tab shared cache)
    if (window.parent && typeof window.parent.__antiLeletFetch === 'function') {
        try {
            return await window.parent.__antiLeletFetch({ action: 'getCsv', sheet: sheetName });
        } catch(e) {
            // Fallback ke local jika parent tidak responsif
        }
    }
    // Fallback: local in-page cache dengan deduplication
    return await _localCachedCsv(sheetName);
}

// Local fallback cache (jika berjalan standalone / parent tidak support Anti-Lelet)
const _LOCAL_CSV_CACHE = {};
const _LOCAL_CSV_INFLIGHT = {};
const _LOCAL_CSV_TTL = 90 * 1000;

async function _localCachedCsv(sheetName) {
    const now = Date.now();
    if (_LOCAL_CSV_CACHE[sheetName] && (now - _LOCAL_CSV_CACHE[sheetName].ts) < _LOCAL_CSV_TTL) {
        return _LOCAL_CSV_CACHE[sheetName].data;
    }
    if (_LOCAL_CSV_INFLIGHT[sheetName]) return _LOCAL_CSV_INFLIGHT[sheetName];
    const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
    const p = apiRequest({ action: 'getCsv', token, sheet: sheetName }).then(data => {
        _LOCAL_CSV_CACHE[sheetName] = { data, ts: Date.now() };
        delete _LOCAL_CSV_INFLIGHT[sheetName];
        return data;
    }).catch(e => { delete _LOCAL_CSV_INFLIGHT[sheetName]; throw e; });
    _LOCAL_CSV_INFLIGHT[sheetName] = p;
    return p;
}

// Fungsi Parsing CSV Mandiri untuk bypass limit dan fetch langsung
function parseCSV(text) {
    let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
    for (let l of text) {
        if ('"' === l) {
            if (s && l === p) row[i] += l;
            s = !s;
        } else if (',' === l && s) l = row[++i] = '';
        else if ('\n' === l && s) {
            if ('\r' === p) row[i] = row[i].slice(0, -1);
            row = ret[++r] = [l = '']; i = 0;
        } else row[i] += l;
        p = l;
    }
    return ret;
}

// Mengambil Data CSV langsung dari Google Sheets ke JSON Array
async function fetchSheetAsJSON(sheetName) {
    try {
        const response = await backendGetCsv(sheetName);
        if (!response || !response.success || !response.csv) return [];
        
        const rows = parseCSV(response.csv);
        if(rows.length < 1) return [];

        // AUTO-DETECT HEADER ROW (Bypass jika ada judul/baris kosong di atas tabel G-Sheets)
        let headerRowIndex = 0;
        for(let i = 0; i < Math.min(10, rows.length); i++) {
            const rowStr = rows[i].join('').toUpperCase();
            // Indikator kuat bahwa ini adalah baris header tabel
            if(rowStr.includes('NAMA') || rowStr.includes('STO') || rowStr.includes('TEKNISI') || rowStr.includes('NIK') || rowStr.includes('TIKET') || rowStr.includes('INCIDENT')) {
                headerRowIndex = i;
                break;
            }
        }

        const headers = rows[headerRowIndex];
        const data = [];
        for(let i = headerRowIndex + 1; i < rows.length; i++) {
            if (!rows[i].some(cell => cell && cell.trim() !== '')) continue; // Skip baris kosong
            let obj = {};
            for(let j = 0; j < headers.length; j++) {
                let headerName = headers[j] ? headers[j].trim() : `COL_${j}`;
                if (headerName) obj[headerName] = rows[i][j] || "";
            }
            data.push(obj);
        }
        return data;
    } catch(e) {
        console.error("Error fetchSheetAsJSON", e);
        return [];
    }
}

function getLooseVal(row, keywords) {
    if (!row || typeof row !== 'object') return "";
    let keys = Object.keys(row);
    for (let kw of keywords) {
        let cleanKw = kw.toUpperCase().replace(/[^A-Z0-9]/g, '');
        for (let key of keys) {
            let cleanKey = key.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (cleanKey === cleanKw || cleanKey.includes(cleanKw)) {
                if (row[key] !== null && row[key] !== undefined && row[key] !== "") {
                    return row[key];
                }
            }
        }
    }
    return "";
}

function getVal(row, possibleKeys) {
    if (!row || typeof row !== 'object') return "";
    let keys = Object.keys(row);
    
    // Prioritas 1: Exact Match (Kecocokan Persis - Case Insensitive)
    for (let k of keys) {
        let ku = k.trim().toUpperCase();
        if (possibleKeys.map(p => p.toUpperCase()).includes(ku)) return row[k];
    }
    
    // Prioritas 2: Pencarian Parsial Aman yang Ditingkatkan
    for (let k of keys) {
        let ku = k.trim().toUpperCase();
        for (let pk of possibleKeys) {
            if (ku.includes(pk.toUpperCase())) return row[k];
        }
        
        // Fallback spesifik untuk kolom yang sering divariasikan penamaannya
        if (possibleKeys.includes('NAMA') && (ku.includes('NAMA') || ku.includes('TEKNISI') || ku.includes('LENGKAP'))) return row[k];
        if (possibleKeys.includes('NIK') && (ku.includes('NIK') || ku.includes('ID TEKNISI'))) return row[k];
        if (possibleKeys.includes('NO HP') && (ku.includes('HP') || ku.includes('TELEPON'))) return row[k];
        if (possibleKeys.includes('FLAGGING TEKNISI') && ku.includes('FLAGGING')) return row[k];
        if (possibleKeys.includes('SERVICE AREA') && ku.includes('AREA')) return row[k];
    }
    return "";
}

// Fungsi Pemetaan Otomatis (Ultra-Robust) untuk Kalender
function buildDateMap(data) {
    dateKeyMap = {};
    if (!data || !Array.isArray(data) || data.length === 0) return;
    
    const knownKeys = [
        "NO", "NUM", "NOMOR", "NIK", "ID TEKNISI", "NAMA", "NAMA TEKNISI", "NAMA LENGKAP", 
        "NO HP", "NOHP", "NO. HP", "TELEPON", "SERVICE AREA", "SA", "SEKTOR", "SECTOR", 
        "STO", "LOKASI", "BRANCH", "CABANG", "POSISI", "POSITION", "FLAGGING TEKNISI", 
        "FLAGGING", "MITRA", "VENDOR"
    ];
    
    let firstRowKeys = Object.keys(data[0]);
    let unknownKeys = firstRowKeys.filter(k => {
        let ku = k.trim().toUpperCase();
        return !knownKeys.some(known => ku === known || ku.includes(known));
    });
    
    let mappedCount = 0;
    unknownKeys.forEach(k => {
        let cleanK = k.trim();
        if (/^(0?[1-9]|[12]\d|3[01])$/.test(cleanK)) {
            let day = parseInt(cleanK, 10);
            dateKeyMap[day] = k;
            mappedCount++;
            return;
        }
        let d = new Date(cleanK);
        if (!isNaN(d.getTime())) {
            let day = d.getDate();
            if (!dateKeyMap[day]) { 
                dateKeyMap[day] = k;
                mappedCount++;
            }
            return;
        }
    });
    
    if (mappedCount < 10 && unknownKeys.length >= 28) {
        dateKeyMap = {};
        unknownKeys.forEach((k, idx) => {
            if (idx < 31) dateKeyMap[idx + 1] = k;
        });
    }
}

function getKehadiranStatus(r, day) {
    let mappedKey = dateKeyMap[day];
    if (mappedKey && r[mappedKey] !== undefined) return r[mappedKey];
    let dayStr = day.toString();
    if (r[dayStr] !== undefined) return r[dayStr];
    return "";
}

function norm(v) { return (v || "").toString().toUpperCase().replace(/\s+/g, "").replace(/-/g, ""); }
function mapSTO(val) { 
    let n = norm(val); 
    if(n.includes("PBRC") || n === "PBB") return "PBR"; 
    let res = (val || "").toString().toUpperCase();
    if(res === "KDS" || n === "KDS") return "MIS";
    if(res === "PBB") return "PBR";
    return res; 
}
function mapSEKTOR(val) { 
    let n = norm(val); 
    if(n.includes("ARENGKA")) return ["ARK-1", "ARK-2"]; 
    if(n.includes("PBRC1") || n.includes("PBB1")) return ["PBRC 1"];
    if(n.includes("PBRC2") || n.includes("PBB2")) return ["PBRC 2"];
    if(n.includes("PBRC3") || n.includes("PBB3")) return ["PBRC 3"];
    if(n.includes("PBRC4") || n.includes("PBB4")) return ["PBRC 4"];
    let res = (val || "").toString().toUpperCase();
    if(res === "KDS" || n === "KDS") return ["MIS"];
    return [res]; 
}
function extractName(f) { if(!f) return 'N/A'; const s = f.toString(); const i = s.indexOf('-'); return i !== -1 ? s.substring(i+1).trim() : s.trim(); }

function getSA(r) {
    let st = mapSTO(r.STO || r.LOKASI);
    let sek = (r.SEKTOR || "").toUpperCase().replace(/\s/g, '');
    if (sek.includes("PBRC1") || sek.includes("PBB1") || sek.includes("PBRC2") || sek.includes("PBB2")) return "PBR BARAT";
    if (sek.includes("PBRC3") || sek.includes("PBB3") || sek.includes("PBRC4") || sek.includes("PBB4")) return "PBR TIMUR";
    if (st === 'PBR') return "PBR BARAT";
    if (st === 'ARK' || sek.includes("ARK")) return "ARENGKA";
    return SA_MAP[st] || "OTHER";
}

function getTicketBucket(r) {
    const kt = (r["KATEGORI TTR"] || "").toString().toUpperCase().trim();
    const c = (r["CUST ASSIGN"] || "").toString().toUpperCase().trim();
    if (kt.includes("MANJA") || c.includes("TTR 3 JM") || c.includes("TTR 3JM")) return "MANJA";
    
    const tipe = (r["TIPE TIKET"] || r["TIPE"] || "").toString().toUpperCase().trim();
    const detail = (r["DETAIL TIKET"] || r["KETERANGAN"] || "").toString().toUpperCase().trim();

    if (c.includes("SQM") || kt.includes("SQM") || detail.includes("SQM")) return "SQM";
    if (c.includes("Z_PERMINTAAN") || c.includes("Z PERMINTAAN") || kt.includes("Z_PERMINTAAN") || detail.includes("Z_PERMINTAAN")) return "Z_PERMINTAAN";
    if (c.includes("UNDERSPEC") || kt.includes("UNDERSPEC") || tipe.includes("UNDERSPEC") || detail.includes("UNDERSPEC") || c.includes("USPEC")) return "UNDERSPEC";
    
    const v = (r["FLAG HVC"] || r["FLAG_HVC"] || "").toString().toUpperCase();
    if(v.includes("PLATINUM") || c.includes("TTR 6 JP") || c.includes("TTR 6JP") || detail.includes("PLATINUM")) return "HVC PLATINUM";
    if(v.includes("DIAMOND") || c.includes("TTR 3 JD") || c.includes("TTR 3JD") || detail.includes("DIAMOND")) return "HVC DIAMOND";
    if(v.includes("GOLD") || c.includes("TTR 12 JG") || c.includes("TTR 12JG") || detail.includes("GOLD")) return "NON_HVC_GOLD";
    
    return "NON_HVC_REGULER"; 
}

function isToday(dateString) {
    if (!dateString) return false;
    const d = new Date(dateString);
    if (isNaN(d.getTime())) return false;
    const today = new Date();
    return d.getDate() === today.getDate() &&
           d.getMonth() === today.getMonth() &&
           d.getFullYear() === today.getFullYear();
}

function getTicketAge(r) {
    const dStr = r["REPORT DATE"] || r["DATEK"]; if(!dStr) return "UNKNOWN";
    const d = new Date(dStr); if(isNaN(d.getTime())) return "UNKNOWN";
    const now = new Date();
    const rDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const cDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    
    if (rDay.getTime() === cDay.getTime()) return "H0";
    if (rDay.getTime() < cDay.getTime()) {
        const diffDays = Math.round((cDay.getTime() - rDay.getTime()) / (1000 * 60 * 60 * 24));
        if (diffDays >= 1 && diffDays <= 1095) return "H-1";
    }
    return "UNKNOWN";
}

function getDurasiSeconds(r) {
    const op = isTicketOpen(r);
    const bucket = getTicketBucket(r);
    let startStr = r["REPORT DATE"] || r["DATEK"];
    if (bucket === "MANJA" && r["JAM CUST ASSIGN"]) startStr = r["JAM CUST ASSIGN"];

    if(!op && r["DURASI CLOSE"] && r["DURASI CLOSE"].trim() !== "" && bucket !== "MANJA") {
        const p = r["DURASI CLOSE"].split(':');
        if(p.length === 3) return (parseInt(p[0])*3600)+(parseInt(p[1])*60)+parseInt(p[2]);
    }

    if(!startStr) return 0;
    const s = new Date(startStr); if(isNaN(s.getTime())) return 0;
    let endStr = r["JAM TECH CLOSED"] || r["AM TECH CLOSE"];
    const e = !op ? (endStr ? new Date(endStr) : new Date()) : new Date();
    
    return Math.max(0, (e - s) / 1000);
}

function calculateDuration(sS, eS, st, bucket = "") {
    if(!sS) return "-";
    const s = new Date(sS); if(isNaN(s.getTime())) return "-";
    const op = isTicketOpen({ "STATUS TIKET": st });
    const e = (!op && eS) ? new Date(eS) : new Date();
    let df = Math.max(0, (e - s)/1000);
    const hr = Math.floor(df/3600); const mn = Math.floor((df%3600)/60); const sc = Math.floor(df%60);
    return `${hr}:${mn.toString().padStart(2, "0")}:${sc.toString().padStart(2, "0")}`;
}

function getDurasi(r) {
    const bucket = getTicketBucket(r);
    let start = r["REPORT DATE"] || r["DATEK"];
    if (bucket === "MANJA" && r["JAM CUST ASSIGN"]) start = r["JAM CUST ASSIGN"];

    if(!isTicketOpen(r)) {
        if(bucket !== "MANJA" && r["DURASI CLOSE"] && r["DURASI CLOSE"].trim() !== "") return r["DURASI CLOSE"];
        let end = r["JAM TECH CLOSED"] || r["AM TECH CLOSE"];
        return calculateDuration(start, end, r["STATUS TIKET"], bucket);
    }
    return calculateDuration(start, null, "OPEN", bucket);
}

function getBaseData() {
    if (ticketTypeMode === 'BELUM_ORDER') {
        return rawBelumOrderData;
    }
    
    return rawData.filter(r => {
        const c = (r["CUST ASSIGN"] || "").toString().toUpperCase().trim();
        const kt = (r["KATEGORI TTR"] || "").toString().toUpperCase().trim();
        const tipe = (r["TIPE TIKET"] || r["TIPE"] || "").toString().toUpperCase().trim();
        const detail = (r["DETAIL TIKET"] || r["KETERANGAN"] || "").toString().toUpperCase().trim();
        
        const isSqm = c.includes("SQM") || kt.includes("SQM");
        const isZPerm = c.includes("Z_PERMINTAAN") || kt.includes("Z_PERMINTAAN") || c.includes("Z_PERMINTAAN");
        const isUnderspec = c.includes("UNDERSPEC") || kt.includes("UNDERSPEC") || tipe.includes("UNDERSPEC") || detail.includes("UNDERSPEC") || c.includes("USPEC");
        
        if (ticketTypeMode === 'ALL_TIKET' || ticketTypeMode === 'MONITORING_ORDER' || ticketTypeMode === 'KEHADIRAN_TEKNISI') return true; 
        
        if (ticketTypeMode === 'REGULER') {
            return !isSqm && !isZPerm && !isUnderspec; 
        }
        if (ticketTypeMode === 'SQM') return isSqm;
        if (ticketTypeMode === 'Z_PERMINTAAN') return isZPerm;
        if (ticketTypeMode === 'UNDERSPEC') return isUnderspec;
        return true;
    });
}

async function fetchGeminiWithRetry(prompt, retries = 5) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`;
    const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "Anda adalah Asisten AI Profesional untuk Supervisor Network Operation Center (NOC). Tugas Anda menganalisis performa harian tiket gangguan dan memberikan insight eksekutif yang tajam. Gunakan tag HTML dasar untuk format (seperti <h3>, <p>, <ul>, <li>, <strong>) agar terlihat rapi di dashboard web. Hindari simbol markdown murni seperti ** atau *." }] }
    };

    for (let i = 0; i < retries; i++) {
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, AI tidak dapat menghasilkan insight saat ini.";
        } catch (error) {
            const delay = Math.pow(2, i) * 1000;
            await new Promise(res => setTimeout(res, delay));
            if (i === retries - 1) throw error;
        }
    }
}

        - Total Saldo Tiket Terbuka: ${open}

        <ul style="list-style-type:disc; padding-left:20px; margin-bottom:16px; display:flex; flex-direction:column; gap:8px;">

    else if (mode === 'SA') modeText = 'SERVICE AREA';
    else if (mode.startsWith('SA_')) modeText = mode.replace('SA_', 'SA ').replace(/_/g, ' ');

    let titleText = `Detail Area: <span class="text-blue-600">${ln}</span> (${modeText})`;
    if (sf !== 'ALL') {
        let badgeColor = sf.includes('NOT') || sf === 'OPEN' ? 'text-rose-600 bg-rose-50 px-2 py-0.5 rounded' : 'text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded';
        if (sf === 'COMPLY') badgeColor = 'text-blue-600 bg-blue-50 px-2 py-0.5 rounded';
        titleText += ` ➔ <span class="font-black ${badgeColor}">${sf}</span>`;
    } 
    if (bc) titleText += ` ➔ <span class="font-black text-purple-600 bg-purple-50 px-2 py-0.5 rounded">${bc.replace('_', ' ')}</span>`;
    
    document.getElementById('modalTitle').innerHTML = titleText;
    
    const isS = ['SEKTOR', 'SA_PBR_BARAT', 'SA_PBR_TIMUR'].includes(mode);
    const isSA = mode === 'SA';

    let fd = getBaseData().filter(r => { 
        if (isSA) return getSA(r) === ln;
        let s = (r.SEKTOR || "").toUpperCase(); let st = (r.STO || "").toUpperCase(); 
        return isS ? mapSEKTOR(s).includes(ln) : mapSTO(st) === ln; 
    });
    
    if(sf==='OPEN') fd=fd.filter(r=>isTicketOpen(r)); 
    else if(sf==='CLOSE') fd=fd.filter(r=>!isTicketOpen(r));
    else if(sf==='COMPLY') fd=fd.filter(r=>{
        const bkt = getTicketBucket(r);
        if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false;
        if (bkt === "MANJA") return !isTicketOpen(r) && getDurasiSeconds(r) <= 10800;
        return !isTicketOpen(r) && (r.SLA||"").toUpperCase().trim()==='COMPLY';
    });
    else if(sf==='NOT COMPLY') fd=fd.filter(r=>{
        const bkt = getTicketBucket(r);
        if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false;
        if (bkt === "MANJA") return !isTicketOpen(r) && getDurasiSeconds(r) > 10800;
        if (bkt === 'NON_HVC_GOLD' || bkt === 'NON_HVC_REGULER') return !isTicketOpen(r) && !isNonHvcComply(r, bkt);
        return !isTicketOpen(r) && (r.SLA||"").toUpperCase().trim()==='NOT COMPLY';
    });
    
    if(bc) fd=fd.filter(r=>getTicketBucket(r)===bc); 
    renderTable(fd);
}
window.openLocation = openLocation;

function openMatrixDetail(loc, catId, rowType, agingIdx = -1) {
    activeModal = { type: 'MATRIX', loc, catId, rowType, agingIdx };
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalDownloadGroup').classList.remove('hidden');
    document.getElementById('btnModalBack').classList.add('hidden');
    document.getElementById('btnModalBack').classList.remove('flex');
    document.getElementById('hvcView').classList.add('hidden');
    document.getElementById('tableView').classList.remove('hidden');
    let titleStr = `Laporan Detail ➔ <span class="text-blue-600">${loc}</span>`;
    if (catId !== 'ALL') titleStr += ` ➔ <span class="text-purple-600">${catId.replace('_', ' ')}</span>`;
    titleStr += ` ➔ <span class="text-emerald-600">${rowType.replace('_', ' ')}</span>`;
    if (rowType === 'AGING' && agingIdx >= 0) {
        const conf = categoryConfigs.find(c => c.id === catId);
        if (conf) titleStr += ` (${conf.ranges[agingIdx].l})`;
    }
    document.getElementById('modalTitle').innerHTML = titleStr;
    let data = getActiveData(); const now = new Date();
    if (loc !== 'TOTAL') {
        data = data.filter(r => {
            if (mode === 'SA') return getSA(r) === loc;
            let s = (r["SEKTOR"] || "").toUpperCase(); let st = (r["STO"] || "").toUpperCase();
            if (['SEKTOR', 'SA_PBR_BARAT', 'SA_PBR_TIMUR'].includes(mode)) return mapSEKTOR(s).includes(loc);
            if (loc.startsWith("PBRC")) {
                let cleanS = s.replace(/\s/g, '');
                let cleanLoc = loc.replace(/\s/g, '');
                let altLoc = cleanLoc.replace("PBRC", "PBB");
                if (cleanS.includes(cleanLoc) || cleanS.includes(altLoc)) return true;
                if (mapSTO(st) === 'PBR' && loc === "PBRC 1") return true;
                return false;
            }
            return mapSTO(st) === loc;
        });
    }
    if (catId !== 'ALL') data = data.filter(r => getTicketBucket(r) === catId);
    
    if (rowType === 'OPEN') data = data.filter(r => isTicketOpen(r));
    else if (rowType === 'CLOSE') data = data.filter(r => !isTicketOpen(r));
    else if (rowType === 'COMPLY') data = data.filter(r => {
        if (isTicketOpen(r)) return false;
        const bkt = getTicketBucket(r);
        if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false;
        if (bkt === "MANJA") return getDurasiSeconds(r) <= 10800;
        if (bkt === 'NON_HVC_GOLD' || bkt === 'NON_HVC_REGULER') return isNonHvcComply(r, bkt);
        return (r.SLA || "").toUpperCase().trim() === "COMPLY";
    });
    else if (rowType === 'NOT_COMPLY') data = data.filter(r => {
        if (isTicketOpen(r)) return false;
        const bkt = getTicketBucket(r);
        if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false;
        if (bkt === "MANJA") return getDurasiSeconds(r) > 10800;
        if (bkt === 'NON_HVC_GOLD' || bkt === 'NON_HVC_REGULER') return !isNonHvcComply(r, bkt);
        return (r.SLA || "").toUpperCase().trim() === "NOT COMPLY";
    });
    else if (rowType === 'SALDO_H1') data = data.filter(r => getTicketAge(r) === "H-1");
    else if (rowType === 'SALDO_HI') data = data.filter(r => isTicketOpen(r) && (!r["REPORT DATE"] || (now - new Date(r["REPORT DATE"])) / 864e5 <= 1095));
    else if (rowType === 'UNDERSPEC_SALDO_PAGI') data = data.filter(r => {
        if (isTicketOpen(r)) return true;
        let sessionStr = (r["JAM TECH CLOSE"] || r["AM TECH CLOSE"] || r["JAM TECH CLOSED"] || r["AM TECH CLOSED"] || r["JAM CLOSE"] || "").toString().replace(/:/g, '.').replace(/\s/g, '').toUpperCase();
        if (sessionStr.includes("08.00-12.00") || sessionStr.includes("8.00-12.00") || sessionStr.includes("12.00-16.00") || sessionStr.includes("16.00-20.00") || sessionStr.includes("16.00-24.00") || sessionStr.includes("20.00-00.00")) return true;
        let closeTime = r["TGL CLOSE"] || r["DATEK CLOSE"] || r["REPORT DATE"] || r["JAM TECH CLOSED"] || r["AM TECH CLOSE"];
        return isToday(closeTime);
    });
    else if (rowType === 'UNDERSPEC_AUTO_SPEC') data = data.filter(r => {
        let hasInet = (r["NOMOR INET"] || r["INET"] || "").toString().trim() !== "";
        let autoSpecKey = Object.keys(r).find(k => {
            let ku = k.toUpperCase().replace(/\n/g, ' ').replace(/\s+/g, ' ');
            return ku.includes("AUTO SPEC") || ku.includes("U SPEC PAGI") || ku === "U" || ku.includes("KOLOM U");
        });
        if (autoSpecKey && r[autoSpecKey]) {
            let val = r[autoSpecKey].toString().replace(/\s+/g, ' ').trim().toUpperCase();
            return val.includes("SPEC PAGI") && hasInet;
        }
        return false;
    });
    else if (rowType === 'UNDERSPEC_KENDALA') data = data.filter(r => {
        return isTicketOpen(r) && ((r["KETERANGAN"] || "").toUpperCase().includes("KENDALA") || (r["STATUS TIKET"] || "").toUpperCase().includes("PENDING") || (r["STATUS KENDALA"] || "").toUpperCase().includes("KENDALA"));
    });
    else if (rowType === 'UNDERSPEC_CLOSE_HI') data = data.filter(r => {
        if (isTicketOpen(r)) return false;
        let sessionStr = (r["JAM TECH CLOSE"] || r["AM TECH CLOSE"] || r["JAM TECH CLOSED"] || r["AM TECH CLOSED"] || r["JAM CLOSE"] || "").toString().replace(/:/g, '.').replace(/\s/g, '').toUpperCase();
        if (sessionStr.includes("08.00-12.00") || sessionStr.includes("8.00-12.00") || sessionStr.includes("12.00-16.00") || sessionStr.includes("16.00-20.00") || sessionStr.includes("16.00-24.00") || sessionStr.includes("20.00-00.00")) return true;
        let closeTime = r["TGL CLOSE"] || r["DATEK CLOSE"] || r["REPORT DATE"] || r["JAM TECH CLOSED"] || r["AM TECH CLOSE"];
        return isToday(closeTime);
    });
    else if (rowType === 'UNDERSPEC_SISA_PROGRES') data = data.filter(r => {
        let isK = (r["KETERANGAN"] || "").toUpperCase().includes("KENDALA") || (r["STATUS TIKET"] || "").toUpperCase().includes("PENDING") || (r["STATUS KENDALA"] || "").toUpperCase().includes("KENDALA");
        return isTicketOpen(r) && !isK;
    });
    else if (rowType === 'UNDERSPEC_SISA_ALL') data = data.filter(r => isTicketOpen(r));
    else if (rowType === 'AGING') data = data.filter(r => {
        const bkt = getTicketBucket(r);
        if (bkt === "MANJA") {
            if (!isTicketOpen(r)) return false;
            if (!isToday(r["JAM CUST ASSIGN"])) return false;
            const hour = new Date(r["JAM CUST ASSIGN"]).getHours();
            const cfg = categoryConfigs.find(c => c.id === "MANJA");
            let targetIdx = cfg.ranges.length - 1;
            for (let i = 0; i < cfg.ranges.length; i++) {
                if (hour === cfg.ranges[i].h) { targetIdx = i; break; }
            }
            return targetIdx === parseInt(agingIdx);
        } else {
            if (!isTicketOpen(r)) return false;
            const hrs = getDurasiSeconds(r) / 3600; const conf = categoryConfigs.find(c => c.id === catId);
            let idx = conf.ranges.length - 1;
            for (let i = 0; i < conf.ranges.length; i++) if (hrs <= conf.ranges[i].max) { idx = i; break; }
            return idx === parseInt(agingIdx);
        }
    });
    renderTable(data);
}
window.openMatrixDetail = openMatrixDetail;

async function exportElementToImage(elementId, fileNamePrefix, btnElement) {
    const el = document.getElementById(elementId);
    if(!el) return;
    
    const scrollWrappers = el.querySelectorAll('.overflow-y-auto, .overflow-x-auto, [class*="max-h-"]');
    const originalStyles = [];
    
    scrollWrappers.forEach(w => {
        originalStyles.push({
            el: w,
            maxHeight: w.style.maxHeight,
            overflow: w.style.overflow,
            overflowX: w.style.overflowX,
            overflowY: w.style.overflowY
        });
        w.style.maxHeight = 'none';
        w.style.overflow = 'visible';
        w.style.overflowX = 'visible';
        w.style.overflowY = 'visible';
    });

    const originalText = btnElement.innerHTML;
    btnElement.innerHTML = `<span class="animate-pulse">⏳ Menyimpan HD...</span>`;
    btnElement.disabled = true;

    try {
        await new Promise(r => setTimeout(r, 300)); 
        const canvas = await html2canvas(el, { 
            scale: 5, 
            backgroundColor: '#ffffff',
            useCORS: true,
            logging: false
        });
        
        const link = document.createElement('a');
        const dateStr = new Date().toLocaleString('id-ID', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/[\/\s:]/g, '');
        link.download = `${fileNamePrefix}_${dateStr}_UltraHD.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    } catch (e) {
        showToast("Gagal menyimpan gambar: " + e.message);
    } finally {
        scrollWrappers.forEach((w, i) => {
            w.style.maxHeight = originalStyles[i].maxHeight;
            w.style.overflow = originalStyles[i].overflow;
            w.style.overflowX = originalStyles[i].overflowX;
            w.style.overflowY = originalStyles[i].overflowY;
        });
        btnElement.innerHTML = originalText;
        btnElement.disabled = false;
    }
}
window.exportElementToImage = exportElementToImage;

function exportTableToExcel(tablesArray, fileNamePrefix) {
    try {
        // PERBAIKAN 1: Wajib menggunakan \r\n agar Excel Windows bisa membaca pemisah Multi-Sheet dengan sempurna
        let mhtml = `MIME-Version: 1.0\r\nX-Document-Type: Workbook\r\nContent-Type: multipart/related; boundary="----=_NextPart_dummy"\r\n\r\n`;
        mhtml += `------=_NextPart_dummy\r\nContent-Location: workbook.htm\r\nContent-Type: text/html; charset=utf-8\r\n\r\n`;
        mhtml += `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">\r\n<head>\r\n<meta charset="utf-8">\r\n<xml>\r\n<x:ExcelWorkbook>\r\n<x:ExcelWorksheets>\r\n`;
        
        // Modifikasi khusus untuk menambahkan matriks Underspec
        if (tablesArray.length === 1 && tablesArray[0].id === 'matrixTableExport' && ticketTypeMode === 'ALL_TIKET') {
            tablesArray.push({id: 'matrixTableExport_Underspec', title: '2. Laporan Underspec (Matriks)'});
        }

        tablesArray.forEach((item, idx) => {
            let safeTitle = item.title.replace(/[\\/?*:[\]]/g, '').substring(0, 31);
            mhtml += `<x:ExcelWorksheet>\r\n<x:Name>${safeTitle}</x:Name>\r\n<x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>\r\n<x:WorksheetSource HRef="sheet${idx}.htm"/>\r\n</x:ExcelWorksheet>\r\n`;
        });
        
        mhtml += `</x:ExcelWorksheets>\r\n</x:ExcelWorkbook>\r\n</xml>\r\n</head>\r\n<body></body>\r\n</html>\r\n\r\n`;

        let hasData = false;

        // PERBAIKAN 2: Fungsi untuk mengubah warna RGB/RGBA (dari layar) menjadi HEX (yang didukung Excel)
        function rgb2hex(rgb) {
            if (!rgb || rgb === 'rgba(0, 0, 0, 0)' || rgb === 'transparent') return '';
            let res = rgb.match(/^rgba?[\s+]?\([\s+]?(\d+)[\s+]?,[\s+]?(\d+)[\s+]?,[\s+]?(\d+)/i);
            return (res && res.length === 4) ? "#" +
                ("0" + parseInt(res[1], 10).toString(16)).slice(-2) +
                ("0" + parseInt(res[2], 10).toString(16)).slice(-2) +
                ("0" + parseInt(res[3], 10).toString(16)).slice(-2) : rgb;
        }

        tablesArray.forEach((item, idx) => {
            mhtml += `------=_NextPart_dummy\r\nContent-Location: sheet${idx}.htm\r\nContent-Type: text/html; charset=utf-8\r\n\r\n`;
            mhtml += `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">\r\n<head>\r\n<meta charset="utf-8">\r\n<style>\r\n`;
            mhtml += `table { border-collapse: collapse; font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; white-space: nowrap; }\r\n`;
            mhtml += `td, th { border: 1px solid #cbd5e1; padding: 6px; vertical-align: middle; }\r\n`;
            mhtml += `</style>\r\n</head>\r\n<body>\r\n`;

            const tbl = item.element || document.getElementById(item.id);
            if (tbl) {
                hasData = true;
                const clone = tbl.cloneNode(true);
                const originalRows = tbl.rows;
                const clonedRows = clone.rows;

                for (let i = 0; i < originalRows.length; i++) {
                    const origRow = originalRows[i];
                    const cloneRow = clonedRows[i];

                    if (origRow.style.display === 'none' || origRow.classList.contains('hidden')) {
                        cloneRow.style.display = 'none';
                        continue;
                    }

                    for (let j = 0; j < origRow.cells.length; j++) {
                        const origCell = origRow.cells[j];
                        const cloneCell = cloneRow.cells[j];
                        
                        const compStyle = window.getComputedStyle(origCell);
                        let bgColor = compStyle.backgroundColor;
                        let color = compStyle.color;
                        let fw = compStyle.fontWeight;
                        let ta = compStyle.textAlign;

                        const innerElements = origCell.querySelectorAll('div, span');
                        if (innerElements.length > 0) {
                            for(let el of innerElements) {
                                let innerStyle = window.getComputedStyle(el);
                                if (innerStyle.backgroundColor !== 'rgba(0, 0, 0, 0)' && innerStyle.backgroundColor !== 'transparent') {
                                    bgColor = innerStyle.backgroundColor;
                                }
                                if (innerStyle.color && innerStyle.color !== 'rgb(0, 0, 0)' && innerStyle.color !== 'rgba(0, 0, 0, 0)' && origCell.tagName !== 'TH') {
                                    color = innerStyle.color;
                                }
                                if (innerStyle.fontWeight && parseInt(innerStyle.fontWeight) > 400) {
                                    fw = 'bold';
                                }
                            }
                        }

                        // Terapkan Konversi Warna ke HEX
                        bgColor = rgb2hex(bgColor);
                        color = rgb2hex(color);

                        if (bgColor) cloneCell.style.backgroundColor = bgColor;
                        if (color) cloneCell.style.color = color;
                        cloneCell.style.fontWeight = fw;
                        cloneCell.style.textAlign = ta;
                        cloneCell.style.border = '1px solid #cbd5e1';
                        
                        // Bersihkan teks dari logo SVG dan kode HTML bawaan
                        let htmlStr = origCell.innerHTML;
                        htmlStr = htmlStr.replace(/<svg\b[^>]*>(.*?)<\/svg>/gi, '') 
                                         .replace(/<br\s*[\/]?>/gi, '\n')
                                         .replace(/<\/div>|<\/p>|<\/h[1-6]>|<\/li>/gi, '\n')
                                         .replace(/<[^>]+>/g, '') 
                                         .replace(/&nbsp;/g, ' '); 
                        
                        let cleanText = htmlStr.split('\n').map(t => t.trim()).filter(t => t.length > 0).join('<br>');
                        cloneCell.innerHTML = cleanText || ' '; // Spasi agar cell tidak mengkerut di Excel
                    }
                }
                mhtml += clone.outerHTML;
            }
            mhtml += `\r\n</body>\r\n</html>\r\n\r\n`;
        });

        mhtml += `------=_NextPart_dummy--`;

        if (!hasData) {
            showToast("Tabel belum termuat atau data kosong.");
            return;
        }

        const blob = new Blob([mhtml], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const dateStr = new Date().toLocaleString('id-ID', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/[\/\s:]/g, '');
        
        a.href = url;
        a.download = `${fileNamePrefix}_${dateStr}.xls`;
        document.body.appendChild(a);
        a.click();
        
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast("File Excel berhasil di-download (Multi-Sheet).");
    } catch (e) {
        showToast("Gagal meng-export Excel. " + e.message);
    }
}
window.exportTableToExcel = exportTableToExcel;

// --- EXPORT SUPER FULL (ALL MENU) ---
function generateAnalisaHTMLFromCSV(data) {
    const counts = {}; const stoTotals = {}; let grandTotal = 0;
    const stoOrder = ['ARK','UBT','BKN','PPN','BKR','SEA','SAK','SGP','DUM','BGU','DRI','BAG','BAS','UJT','SLJ','TAK','RGT','AMK','TBH','PMB','KLE','PNP','BLS','PKR','MIS','SOK','PWG','RBI','PBRC 1','PBRC 2','PBRC 3','PBRC 4'];
    stoOrder.forEach(sto => stoTotals[sto] = 0);
    
    for(let i = 1; i < data.length; i++) {
        const row = data[i];
        if(!row || row.length < 27) continue; 
        
        let stoRaw = row[2] ? row[2].trim().toUpperCase() : "";
        const sektorRaw = row[1] ? row[1].trim().toUpperCase() : "";
        const penyebab = row[26] ? row[26].trim().toUpperCase() : ""; // Kolom AA pasti ada di Index 26

        if (!penyebab) continue;

        let cleanSek = sektorRaw.replace(/\s/g, '').replace(/-/g, '');
        let cleanSto = stoRaw.replace(/\s/g, '').replace(/-/g, '');

        if (cleanSek.includes('PBRC1') || cleanSek.includes('PBB1') || cleanSto.includes('PBRC1') || cleanSto.includes('PBB1')) stoRaw = 'PBRC 1';
        else if (cleanSek.includes('PBRC2') || cleanSek.includes('PBB2') || cleanSto.includes('PBRC2') || cleanSto.includes('PBB2')) stoRaw = 'PBRC 2';
        else if (cleanSek.includes('PBRC3') || cleanSek.includes('PBB3') || cleanSto.includes('PBRC3') || cleanSto.includes('PBB3')) stoRaw = 'PBRC 3';
        else if (cleanSek.includes('PBRC4') || cleanSek.includes('PBB4') || cleanSto.includes('PBRC4') || cleanSto.includes('PBB4')) stoRaw = 'PBRC 4';
        else if (stoRaw === 'PBR' || cleanSto.includes('PBB')) stoRaw = 'PBRC 1';

        if(stoRaw && stoTotals[stoRaw] !== undefined) {
            if(!counts[penyebab]) counts[penyebab] = {};
            if(!counts[penyebab][stoRaw]) counts[penyebab][stoRaw] = 0;
            counts[penyebab][stoRaw]++;
            stoTotals[stoRaw]++;
            grandTotal++;
        }
    }

    let html = `<table id="secret_analisa_table" class="w-full text-xs text-center border-collapse"><thead>`;
    html += `
    <tr>
        <th style="background-color:#008B8B; color:white;" class="p-3 border border-slate-300">SERVICE AREA<br>PENYEBAB</th>
        <th style="background-color:#bfdbfe; color:black;" class="border border-slate-300">ARENGKA</th>
        <th colspan="7" style="background-color:#e2e8f0; color:black;" class="border border-slate-300">BUKIT RAYA</th>
        <th colspan="7" style="background-color:#bbf7d0; color:black;" class="border border-slate-300">DUMAI</th>
        <th colspan="8" style="background-color:#fecdd3; color:black;" class="border border-slate-300">RENGAT</th>
        <th colspan="5" style="background-color:#fef08a; color:black;" class="border border-slate-300">PANGKALAN KERINCI</th>
        <th colspan="2" style="background-color:#e9d5ff; color:black;" class="border border-slate-300">PEKANBARU BARAT</th>
        <th colspan="2" style="background-color:#d8b4fe; color:black;" class="border border-slate-300">PEKANBARU TIMUR</th>
        <th style="background-color:#a16207; color:white;" class="border border-slate-300">GRANDTOTAL</th>
    </tr>
    <tr style="background-color:#f8fafc; color:#1e293b;">
        <th style="background-color:#008B8B; color:white;" class="border border-slate-300">TOTAL / STO</th>`;
    stoOrder.forEach(s => html += `<th class="border border-slate-300 p-2">${s}</th>`);
    html += `<th style="background-color:#a16207; color:white;" class="border border-slate-300">TOTAL</th></tr>`;
    
    html += `<tr style="background-color:#475569; color:white; font-weight:bold;"><td class="border border-slate-300 p-2">TOTAL / STO</td>`;
    stoOrder.forEach(s => html += `<td class="border border-slate-300">${stoTotals[s]}</td>`);
    html += `<td class="border border-slate-300">${grandTotal}</td></tr></thead><tbody class="bg-white">`;

    Object.keys(counts).sort().forEach(cause => {
        html += `<tr><td style="background-color:#008B8B; color:white; font-weight:bold;" class="text-left p-2 border border-slate-300">${cause}</td>`;
        let rowTot = 0;
        stoOrder.forEach(sto => {
            let v = counts[cause][sto] || 0;
            rowTot += v;
            let heatStyle = v >= 10 ? 'background-color:#ef4444; color:white; font-weight:bold;' : (v >= 4 ? 'background-color:#fca5a5; color:black;' : (v > 0 ? 'background-color:#fee2e2; color:black;' : 'color:#cbd5e1;'));
            html += `<td style="${heatStyle}" class="border border-slate-300">${v > 0 ? v : 0}</td>`;
        });
        let totHeatStyle = rowTot >= 20 ? 'background-color:#ef4444; color:white; font-weight:bold;' : (rowTot >= 10 ? 'background-color:#fca5a5; color:black; font-weight:bold;' : (rowTot > 0 ? 'background-color:#fee2e2; color:black; font-weight:bold;' : 'font-weight:bold;'));
        html += `<td style="${totHeatStyle}" class="border border-slate-300">${rowTot}</td></tr>`;
    });
    html += `</tbody></table>`;
    return html;
}

// HTML Generator Cepat untuk Tabel Analisa (Meniru layout dan warna TPL3 persis!)
function generateAnalisaHTML() {
    const counts = {}; const stoTotals = {}; let grandTotal = 0;
    const stoOrder = ['ARK','UBT','BKN','PPN','BKR','SEA','SAK','SGP','DUM','BGU','DRI','BAG','BAS','UJT','SLJ','TAK','RGT','AMK','TBH','PMB','KLE','PNP','BLS','PKR','MIS','SOK','PWG','RBI','PBRC 1','PBRC 2','PBRC 3','PBRC 4'];
    stoOrder.forEach(sto => stoTotals[sto] = 0);
    
    rawData.forEach(r => {
        let stoRaw = r.STO ? r.STO.trim().toUpperCase() : "";
        const sektorRaw = r.SEKTOR ? r.SEKTOR.trim().toUpperCase() : "";
        const penyebabKey = Object.keys(r).find(k => k.toUpperCase().includes('ANALISA') || k.toUpperCase().includes('PENYEBAB'));
        let penyebab = penyebabKey && r[penyebabKey] ? r[penyebabKey].trim().toUpperCase() : "";
        if (!penyebab) return;

        const cleanSek = sektorRaw.replace(/\s/g, '');
        if (cleanSek.includes('PBRC1') || cleanSek.includes('PBB1')) stoRaw = 'PBRC 1';
        else if (cleanSek.includes('PBRC2') || cleanSek.includes('PBB2')) stoRaw = 'PBRC 2';
        else if (cleanSek.includes('PBRC3') || cleanSek.includes('PBB3')) stoRaw = 'PBRC 3';
        else if (cleanSek.includes('PBRC4') || cleanSek.includes('PBB4')) stoRaw = 'PBRC 4';
        else if (stoRaw === 'PBR') stoRaw = 'PBRC 1';

        if(stoRaw && stoTotals[stoRaw] !== undefined) {
            if(!counts[penyebab]) counts[penyebab] = {};
            if(!counts[penyebab][stoRaw]) counts[penyebab][stoRaw] = 0;
            counts[penyebab][stoRaw]++;
            stoTotals[stoRaw]++;
            grandTotal++;
        }
    });

    let html = `<table id="secret_analisa_table" class="w-full text-xs text-center border-collapse"><thead>`;
    html += `
    <tr>
        <th class="bg-[#008B8B] text-white p-3 border border-slate-300">SERVICE AREA<br>PENYEBAB</th>
        <th class="bg-[#bfdbfe] text-black border border-slate-300">ARENGKA</th>

        <th colspan="7" class="bg-[#bbf7d0] text-black border border-slate-300">DUMAI</th>
        <th colspan="8" class="bg-[#fecdd3] text-black border border-slate-300">RENGAT</th>
        <th colspan="5" class="bg-[#fef08a] text-black border border-slate-300">PANGKALAN KERINCI</th>
        <th colspan="2" class="bg-[#e9d5ff] text-black border border-slate-300">PEKANBARU BARAT</th>
        <th colspan="2" class="bg-[#d8b4fe] text-black border border-slate-300">PEKANBARU TIMUR</th>
        <th class="bg-[#a16207] text-white border border-slate-300">GRANDTOTAL</th>
    </tr>
    <tr class="bg-[#f8fafc] text-slate-800">
        <th class="bg-[#008B8B] text-white border border-slate-300">TOTAL / STO</th>`;
    stoOrder.forEach(s => html += `<th class="border border-slate-300 p-2">${s}</th>`);
    html += `<th class="bg-[#a16207] text-white border border-slate-300">TOTAL</th></tr>`;
    
    html += `<tr class="bg-[#475569] text-white font-bold"><td class="border border-slate-300 p-2">TOTAL / STO</td>`;
    stoOrder.forEach(s => html += `<td class="border border-slate-300">${stoTotals[s]}</td>`);
    html += `<td class="border border-slate-300">${grandTotal}</td></tr></thead><tbody class="bg-white">`;

    Object.keys(counts).sort().forEach(cause => {
        html += `<tr><td class="bg-[#008B8B] text-white text-left p-2 border border-slate-300 font-bold">${cause}</td>`;
        let rowTot = 0;
        stoOrder.forEach(sto => {
            let v = counts[cause][sto] || 0;
            rowTot += v;
            let heatCls = v >= 10 ? 'bg-[#ef4444] text-white font-bold' : (v >= 4 ? 'bg-[#fca5a5] text-slate-900' : (v > 0 ? 'bg-[#fee2e2] text-slate-900' : 'text-slate-300'));

    });
    html += `</tbody></table>`;
    return html;
}

function generateMonitoringHTML() {

        else if (s === 'PBR') s = "PBRC 1";

        } else { 
            const rt = r["JAM TECH CLOSED"]||r["AM TECH CLOSE"]; 
            if(rt) { 
                const dt=new Date(rt); 
                if(!isNaN(dt.getTime())){ 
                    const hr=dt.getHours(); 
                    gr[s][k].cl.push({inc:r.NOTIKET,hr}); 
                } 
            } 
        }
    });

    let html = `<table id="secret_monitoring_table" class="w-full text-xs text-center border-collapse"><thead>`;
    html += `
        <tr class="bg-[#2f5597] text-white font-bold uppercase">
            <th class="p-3 border border-slate-300 min-w-[150px]">AREA / SEKTOR</th>
            <th class="p-3 border border-slate-300 min-w-[200px]">TEKNISI UTAMA & PENDAMPING</th>
            <th class="p-3 border border-slate-300">00-02</th><th class="p-3 border border-slate-300">02-04</th>
            <th class="p-3 border border-slate-300">04-06</th><th class="p-3 border border-slate-300">06-08</th>
            <th class="p-3 border border-slate-300">08-10</th><th class="p-3 border border-slate-300">10-12</th>
            <th class="p-3 border border-slate-300">12-14</th><th class="p-3 border border-slate-300">14-16</th>
            <th class="p-3 border border-slate-300">16-18</th><th class="p-3 border border-slate-300">18-20</th>
            <th class="p-3 border border-slate-300">20-22</th><th class="p-3 border border-slate-300">22-00</th>
        </tr>
    </thead><tbody class="bg-white">`;

    let gtTim = 0;
    let gtClose = 0;
    let gtSess = Array(12).fill(0);

    Object.keys(gr).sort().forEach(s => {
        let totalCloseArea = 0;
        let sessTotals = Array(12).fill(0);
        let countTim = Object.keys(gr[s]).length;
        
        gtTim += countTim;

        Object.keys(gr[s]).forEach(tk => {
            totalCloseArea += gr[s][tk].cl.length;
            gr[s][tk].cl.forEach(t => {
                let bIdx = Math.floor(t.hr / 2);
                if (bIdx >= 0 && bIdx <= 11) sessTotals[bIdx]++;
            });
        });
        
        gtClose += totalCloseArea;
        for(let i=0; i<12; i++) gtSess[i] += sessTotals[i];
        
        let sessHTML = sessTotals.map(tot => {
            return `<td class="p-2 text-center border border-slate-300 font-bold ${tot > 0 ? 'text-[#047857] bg-[#d1fae5]' : 'text-slate-300'}">${tot > 0 ? tot : '-'}</td>`;
        }).join('');
        
        html += `<tr class="bg-[#f1f5f9]">
            <td class="p-2 font-black text-left text-[#1d4ed8] border border-slate-300">${s}</td>
            <td class="p-2 font-bold text-left border border-slate-300 text-slate-600">${countTim} Tim | ${totalCloseArea} Close</td>
            ${sessHTML}
        </tr>`;

        Object.keys(gr[s]).sort().forEach(tk => {
            const inf = gr[s][tk]; 
            const pts = tk.split("|||"); 
            const getB = (h1,h2) => {
                let tickets = inf.cl.filter(t => t.hr>=h1 && t.hr<=h2).map(t => `<div style="background-color:#eff6ff; color:#1d4ed8; padding:2px; margin-bottom:2px; border-radius:4px; border: 1px solid #bfdbfe; text-align:center; font-weight:bold; font-size:10px;">${t.inc}</div>`).join('');
                return tickets;
            };
            
            let t1Name = extractName(pts[0]);
            let t2Name = extractName(pts[1]);
            let dispName = t1Name;
            if (t2Name && t2Name.toUpperCase() !== 'N/A') dispName += ' / ' + t2Name;
            
            let openText = inf.o > 0 ? ` <span style="color:#e11d48; font-weight:bold;">(${inf.o} Open)</span>` : '';

            html += `<tr>
                <td class="p-2 border border-slate-300 bg-white"></td>
                <td class="p-2 font-bold text-left border border-slate-300 bg-white">${dispName}${openText}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(0,1)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(2,3)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(4,5)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(6,7)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(8,9)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(10,11)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(12,13)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(14,15)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(16,17)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(18,19)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(20,21)}</td>
                <td class="p-1 align-top border border-slate-300 bg-white">${getB(22,23)}</td>
            </tr>`;
        });
    });

    let gtSessHTML = gtSess.map(tot => {
        return `<td class="p-2 text-center border border-slate-300 font-bold ${tot > 0 ? 'text-white bg-[#2563eb]' : 'text-slate-500 bg-[#e2e8f0]'}">${tot > 0 ? tot : '-'}</td>`;
    }).join('');

    html += `<tr class="bg-[#cbd5e1]">
        <td class="p-2 font-black text-right text-slate-800 border border-slate-300">GRAND TOTAL</td>
        <td class="p-2 font-bold text-left border border-slate-300 text-slate-800">${gtTim} Tim | ${gtClose} Close</td>
        ${gtSessHTML}
    </tr>`;

    html += `</tbody></table>`;
    return html;
}

// ===== 5. MATRIX TABLE GENERATOR =====
function getUnderspecMatrixHTML() {
    const underspecHierarchy = [
        { branch: 'DUMAI', sas: [{ name: 'BUKIT RAYA', stos: ['BKR', 'BKN', 'PPN', 'SAK', 'SEA', 'SGP', 'UBT'] }, { name: 'DUMAI', stos: ['BAG', 'BAS', 'DUM', 'SLJ', 'BGU', 'DRI'] }] },
        { branch: 'PEKANBARU', sas: [{ name: 'PANGKALAN KERINCI', stos: ['MIS', 'PKR', 'PWG', 'RBI', 'SOK'] }, { name: 'PEKANBARU BARAT', stos: ['PBRC 1', 'PBRC 2'] }, { name: 'PEKANBARU TIMUR', stos: ['PBRC 3', 'PBRC 4'] }, { name: 'RENGAT', stos: ['AMK', 'KLE', 'PMB', 'RGT', 'TAK', 'TBH'] }, { name: 'ARENGKA', stos: ['ARK'] }] }
    ];
    
    const portList = { 'BKR': 8181, 'BKN': 3071, 'PPN': 1271, 'SAK': 1660, 'SEA': 329, 'SGP': 278, 'UBT': 3747, 'BAG': 2217, 'BAS': 2671, 'DUM': 7398, 'SLJ': 2261, 'BGU': 1999, 'DRI': 9901, 'MIS': 1148, 'PKR': 5775, 'PWG': 2521, 'RBI': 6650, 'SOK': 8420, 'PBRC 1': 6867, 'PBRC 2': 8247, 'PBRC 3': 9903, 'PBRC 4': 11748, 'AMK': 3563, 'KLE': 229, 'PMB': 1552, 'RGT': 5537, 'TAK': 4575, 'TBH': 4898, 'ARK': 28254 };
    const displayStos = { 'PBRC 1': 'PBB 1', 'PBRC 2': 'PBB 2', 'PBRC 3': 'PBB 3', 'PBRC 4': 'PBB 4' };

    let metrics = {};
    for(let key in portList) {
        metrics[key] = { list: portList[key], tgt: Math.ceil(portList[key] * 0.0005), saldoPagi: 0, autoSpec: 0, close8_12: 0, close12_16: 0, close16_20: 0, kendala: 0, closeHI: 0, sisaProgres: 0, sisaAll: 0 };
    }

    const data = getActiveData();
    data.forEach(r => {
        if (getTicketBucket(r) !== 'UNDERSPEC') return; 
        
        let sto = mapSTO(r["STO"] || r["LOKASI"]);
        let sek = (r["SEKTOR"] || "").toUpperCase();
        
        let cleanSek = sek.replace(/\s/g, '');
        if (cleanSek.includes("PBRC1") || cleanSek.includes("PBB1")) sto = "PBRC 1"; 
        else if (cleanSek.includes("PBRC2") || cleanSek.includes("PBB2")) sto = "PBRC 2"; 
        else if (cleanSek.includes("PBRC3") || cleanSek.includes("PBB3")) sto = "PBRC 3"; 
        else if (cleanSek.includes("PBRC4") || cleanSek.includes("PBB4")) sto = "PBRC 4";
        else if (sto === 'PBR') sto = "PBRC 1";
        
        if(!metrics[sto]) return; 
        
        let m = metrics[sto];
        let isOpen = isTicketOpen(r);
        let isK = (r["KETERANGAN"] || "").toUpperCase().includes("KENDALA") || 
                  (r["STATUS TIKET"] || "").toUpperCase().includes("PENDING") ||
                  (r["STATUS KENDALA"] || "").toUpperCase().includes("KENDALA");
        
        // 1. DETEKSI AUTO SPEC PAGI (Berdasarkan Nomor INET & Keterangan "SPEC PAGI" di Kolom U)
        let hasInet = (r["NOMOR INET"] || r["INET"] || "").toString().trim() !== "";
        let autoSpecKey = Object.keys(r).find(k => {
            let ku = k.toUpperCase().replace(/\n/g, ' ').replace(/\s+/g, ' ');
            return ku.includes("AUTO SPEC") || ku.includes("U SPEC PAGI") || ku === "U" || ku.includes("KOLOM U");
        });
        
        let isAutoSpec = false;
        if (autoSpecKey && r[autoSpecKey]) {
            let val = r[autoSpecKey].toString().replace(/\s+/g, ' ').trim().toUpperCase();
            if (val.includes("SPEC PAGI") && hasInet) {
                isAutoSpec = true;
            }
        }

        // Tambahkan ke counter autoSpec jika memenuhi kriteria
        if (isAutoSpec) {
            m.autoSpec++;
        }

        if (isOpen) {
            m.sisaAll++;
            if (isK) m.kendala++;
        } else {
            // Sinkronisasi otomatis: Membaca string 'JAM CLOSE PERSESI'
            let sessionStr = (r["JAM TECH CLOSE"] || r["AM TECH CLOSE"] || r["JAM TECH CLOSED"] || r["AM TECH CLOSED"] || r["JAM CLOSE"] || "").toString().replace(/:/g, '.').replace(/\s/g, '').toUpperCase();
            let matchedSession = false;

            if (sessionStr.includes("08.00-12.00") || sessionStr.includes("8.00-12.00")) {
                m.close8_12++; matchedSession = true;
            } else if (sessionStr.includes("12.00-16.00")) {
                m.close12_16++; matchedSession = true;
            } else if (sessionStr.includes("16.00-20.00") || sessionStr.includes("16.00-24.00") || sessionStr.includes("20.00-00.00")) {
                m.close16_20++; matchedSession = true;
            }

            if (matchedSession) {
                m.closeHI++;
            } else {
                // Fallback jika format jam tidak terisi: deteksi dari format tanggal
                let closeTime = r["TGL CLOSE"] || r["DATEK CLOSE"] || r["REPORT DATE"] || r["JAM TECH CLOSED"] || r["AM TECH CLOSE"];
                if (isToday(closeTime)) {
                    m.closeHI++;
                    if (closeTime) {
                        let d = new Date(closeTime);
                        if (!isNaN(d.getTime())) {
                            let h = d.getHours();
                            if (h >= 8 && h < 12) m.close8_12++;
                            else if (h >= 12 && h < 16) m.close12_16++;
                            else if (h >= 16) m.close16_20++;
                        }
                    }
                }
            }
        }
    });

    for(let key in metrics) {
        let m = metrics[key];
        m.sisaProgres = m.sisaAll - m.kendala;
        m.saldoPagi = m.sisaAll + m.closeHI; 
    }

    let html = `<table id="matrixTableExport_Underspec" class="w-full text-[11px] text-center border-collapse bg-white shadow-sm ring-1 ring-slate-200/50">`;
    html += `<thead class="sticky-header shadow-sm">
        <tr class="bg-[#5DADE2] text-slate-900 font-bold uppercase tracking-wider text-[10px]">
            <th rowspan="2" class="px-4 py-3 border-r border-white/40 sticky-col bg-[#5DADE2] w-32 !z-[60] align-middle shadow-[2px_0_5px_rgba(0,0,0,0.1)]">BRANCH</th>
            <th rowspan="2" class="px-4 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle">SERVICE AREA</th>
            <th rowspan="2" class="px-3 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle">STO</th>
            <th rowspan="2" class="px-2 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle">LIST</th>
            <th rowspan="2" class="px-2 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle leading-tight">TGT<br><span class="text-[8px] font-normal opacity-70">(0,05%)</span></th>
            <th rowspan="2" class="px-2 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle leading-tight">TOTAL SALDO<br>PAGI</th>
            <th rowspan="2" class="px-3 py-3 border-r border-white/40 bg-emerald-500 text-white align-middle font-black leading-tight shadow-inner">AUTO SPEC<br>PAGI</th>
            <th colspan="3" class="px-2 py-2 border-r border-b border-white/40 text-center bg-[#7FB3D5] text-slate-900">Jam Close</th>
            <th rowspan="2" class="px-2 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle leading-tight">TOTAL<br>KENDALA</th>
            <th rowspan="2" class="px-2 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle leading-tight">TOTAL CLOSE<br>HI</th>
            <th rowspan="2" class="px-2 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle leading-tight">SISA SALDO BISA<br>DI PROGRES</th>
            <th rowspan="2" class="px-2 py-3 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle leading-tight">SISA SALDO<br>ALL</th>
            <th rowspan="2" class="px-3 py-3 align-middle leading-tight border-l border-white/40 bg-[#5DADE2] text-slate-900 w-16">TOTAL<br>CLOSE</th>
        </tr>
        <tr class="bg-[#7FB3D5] text-slate-800 uppercase text-[9px] font-bold tracking-wide sticky-header-2">
            <th class="px-2 py-2 border-r border-white/40">08:00-12:00</th>
            <th class="px-2 py-2 border-r border-white/40">12:00-16:00</th>
            <th class="px-2 py-2 border-r border-white/40">16:00-20:00</th>
        </tr>
    </thead><tbody>`;

    let totalAll = { list:0, tgt:0, saldoPagi:0, autoSpec:0, close8_12:0, close12_16:0, close16_20:0, kendala:0, closeHI:0, sisaProgres:0, sisaAll:0, branchClose:0 };

    const cellFmt = (val, activeText, activeBg) => {
        if (val > 0) {
            return `<div class="mx-auto min-w-[20px] px-1 py-0.5 flex items-center justify-center transition-all ${activeBg} ${activeText} font-black scale-110 shadow-sm rounded text-[10px] ring-1 ring-current">${val}</div>`;
        }
        return `<div class="mx-auto w-full h-full flex items-center justify-center text-slate-300 font-bold transition-all text-[10px]">0</div>`;
    };

    underspecHierarchy.forEach(branchObj => {
        let branchRows = 0; branchObj.sas.forEach(sa => branchRows += sa.stos.length);
        let branchCloseTotal = 0;
        branchObj.sas.forEach(sa => { sa.stos.forEach(sto => { branchCloseTotal += metrics[sto].closeHI; }); });
        totalAll.branchClose += branchCloseTotal;

        let isFirstBranchRow = true;
        branchObj.sas.forEach(saObj => {
            let saRows = saObj.stos.length;
            let isFirstSARow = true;
            
            saObj.stos.forEach(sto => {
                let m = metrics[sto];
                totalAll.list += m.list; totalAll.tgt += m.tgt; totalAll.saldoPagi += m.saldoPagi; totalAll.autoSpec += m.autoSpec; totalAll.close8_12 += m.close8_12; totalAll.close12_16 += m.close12_16; totalAll.close16_20 += m.close16_20; totalAll.kendala += m.kendala; totalAll.closeHI += m.closeHI; totalAll.sisaProgres += m.sisaProgres; totalAll.sisaAll += m.sisaAll;
                
                let sisaProgresText = 'text-slate-800', sisaProgresBg = 'bg-slate-200';
                if (m.sisaProgres > 0) {
                    if (m.sisaProgres <= m.tgt) { sisaProgresText = 'text-emerald-800'; sisaProgresBg = 'bg-emerald-200'; }
                    else if (m.tgt > 0 && m.sisaProgres <= m.tgt * 1.5) { sisaProgresText = 'text-amber-800'; sisaProgresBg = 'bg-amber-200'; }
                    else { sisaProgresText = 'text-rose-800'; sisaProgresBg = 'bg-rose-200'; }
                }

                html += `<tr class="border-b border-slate-100 hover:bg-blue-50/50 transition-colors group">`;
                if (isFirstBranchRow) html += `<td rowspan="${branchRows}" class="px-4 py-2 font-black text-slate-800 bg-white group-hover:bg-blue-50/50 border-r border-slate-200 align-middle sticky-col shadow-[2px_0_5px_rgba(0,0,0,0.02)] z-10">${branchObj.branch}</td>`;
                if (isFirstSARow) html += `<td rowspan="${saRows}" class="px-4 py-2 font-bold text-slate-700 bg-white group-hover:bg-blue-50/50 border-r border-slate-200 align-middle">${saObj.name}</td>`;
                
                html += `<td class="px-3 py-2 font-bold text-slate-800 border-r border-slate-200 bg-white group-hover:bg-blue-50/50" title="Nama Asli STO: ${sto}">${displayStos[sto] || sto}</td>`;
                
                html += `<td class="px-2 py-1.5 border-r border-slate-100">${cellFmt(m.list, 'text-slate-800', 'bg-slate-200')}</td>`;
                html += `<td class="px-2 py-1.5 border-r border-slate-100">${cellFmt(m.tgt, 'text-blue-800', 'bg-blue-200')}</td>`;
                html += `<td onclick="openMatrixDetail('${sto}', 'UNDERSPEC', 'UNDERSPEC_SALDO_PAGI')" class="cursor-pointer px-2 py-1.5 border-r border-slate-100 bg-slate-50/30 hover:bg-slate-200/50 transition-colors">${cellFmt(m.saldoPagi, 'text-slate-900', 'bg-slate-300')}</td>`;
                html += `<td onclick="openMatrixDetail('${sto}', 'UNDERSPEC', 'UNDERSPEC_AUTO_SPEC')" class="cursor-pointer px-2 py-1.5 border-r border-slate-100 bg-emerald-50/30 hover:bg-emerald-100/50 transition-colors">${cellFmt(m.autoSpec, 'text-emerald-800', 'bg-emerald-200')}</td>`;
                html += `<td class="px-2 py-1.5 border-r border-slate-100">${cellFmt(m.close8_12, 'text-indigo-800', 'bg-indigo-200')}</td>`;
                html += `<td class="px-2 py-1.5 border-r border-slate-100">${cellFmt(m.close12_16, 'text-indigo-800', 'bg-indigo-200')}</td>`;
                html += `<td class="px-2 py-1.5 border-r border-slate-100">${cellFmt(m.close16_20, 'text-indigo-800', 'bg-indigo-200')}</td>`;
                html += `<td onclick="openMatrixDetail('${sto}', 'UNDERSPEC', 'UNDERSPEC_KENDALA')" class="cursor-pointer px-2 py-1.5 border-r border-slate-100 hover:bg-rose-50 transition-colors">${cellFmt(m.kendala, 'text-rose-800', 'bg-rose-200')}</td>`;
                html += `<td onclick="openMatrixDetail('${sto}', 'UNDERSPEC', 'UNDERSPEC_CLOSE_HI')" class="cursor-pointer px-2 py-1.5 border-r border-slate-100 hover:bg-purple-50 transition-colors">${cellFmt(m.closeHI, 'text-purple-800', 'bg-purple-200')}</td>`;
                
                html += `<td onclick="openMatrixDetail('${sto}', 'UNDERSPEC', 'UNDERSPEC_SISA_PROGRES')" class="cursor-pointer px-2 py-1.5 border-r border-slate-100 hover:bg-slate-100 transition-colors">${cellFmt(m.sisaProgres, sisaProgresText, sisaProgresBg)}</td>`;
                html += `<td onclick="openMatrixDetail('${sto}', 'UNDERSPEC', 'UNDERSPEC_SISA_ALL')" class="cursor-pointer px-2 py-1.5 border-r border-slate-200 hover:bg-slate-100 transition-colors">${cellFmt(m.sisaAll, 'text-white', 'bg-slate-800 ring-slate-900')}</td>`;
                
                if (isFirstBranchRow) html += `<td rowspan="${branchRows}" class="px-3 py-2 font-black text-slate-800 bg-slate-50 border-l border-slate-200 align-middle text-center shadow-[inset_2px_0_5px_rgba(0,0,0,0.02)]">${branchCloseTotal > 0 ? `<div class="mx-auto w-10 py-1 bg-indigo-100 text-indigo-800 rounded-md ring-1 ring-indigo-300 shadow-sm scale-110">${branchCloseTotal}</div>` : `<span class="text-slate-300 font-bold">0</span>`}</td>`;
                
                html += `</tr>`;
                isFirstBranchRow = false; isFirstSARow = false;
            });
        });
    });
    
    html += `<tr class="bg-[#5DADE2] text-slate-900 font-black uppercase text-[11px] tracking-wider border-t border-white/50">
        <td colspan="3" class="px-4 py-4 text-right border-r border-white/40 sticky-col bg-[#5DADE2] z-20">TOTAL</td>
        <td class="px-2 py-4 border-r border-white/40">${totalAll.list}</td>
        <td class="px-2 py-4 border-r border-white/40 text-blue-900">${totalAll.tgt}</td>
        <td onclick="openMatrixDetail('TOTAL', 'UNDERSPEC', 'UNDERSPEC_SALDO_PAGI')" class="cursor-pointer px-2 py-4 border-r border-white/40 text-slate-900 hover:bg-white/30 transition-colors">${totalAll.saldoPagi}</td>
        <td onclick="openMatrixDetail('TOTAL', 'UNDERSPEC', 'UNDERSPEC_AUTO_SPEC')" class="cursor-pointer px-2 py-4 border-r border-white/40 bg-emerald-500 text-white hover:bg-emerald-600 transition-colors shadow-inner">${totalAll.autoSpec}</td>
        <td class="px-2 py-4 border-r border-white/40">${totalAll.close8_12}</td>
        <td class="px-2 py-4 border-r border-white/40">${totalAll.close12_16}</td>
        <td class="px-2 py-4 border-r border-white/40">${totalAll.close16_20}</td>
        <td onclick="openMatrixDetail('TOTAL', 'UNDERSPEC', 'UNDERSPEC_KENDALA')" class="cursor-pointer px-2 py-4 border-r border-white/40 text-rose-800 hover:bg-white/30 transition-colors">${totalAll.kendala}</td>
        <td onclick="openMatrixDetail('TOTAL', 'UNDERSPEC', 'UNDERSPEC_CLOSE_HI')" class="cursor-pointer px-2 py-4 border-r border-white/40 text-indigo-900 hover:bg-white/30 transition-colors">${totalAll.closeHI}</td>
        <td onclick="openMatrixDetail('TOTAL', 'UNDERSPEC', 'UNDERSPEC_SISA_PROGRES')" class="cursor-pointer px-2 py-4 border-r border-white/40 hover:bg-white/30 transition-colors">${totalAll.sisaProgres}</td>
        <td onclick="openMatrixDetail('TOTAL', 'UNDERSPEC', 'UNDERSPEC_SISA_ALL')" class="cursor-pointer px-2 py-4 border-r border-white/40 text-slate-900 text-[12px] hover:bg-white/30 transition-colors">${totalAll.sisaAll}</td>
        <td class="px-2 py-4 border-l border-white/40 text-[12px]">${totalAll.branchClose}</td>
    </tr>`;
    html += `</tbody></table>`;
    
    return html;
}

function renderReportTable() {
    const reportEl = document.getElementById('reportTableContent'); if (!reportEl) return;
    
    const titleEl = document.getElementById('matrixReportTitleText');
    if (ticketTypeMode === 'UNDERSPEC') {

        reportEl.innerHTML = getUnderspecMatrixHTML();

    } else if (ticketTypeMode === 'BELUM_ORDER') {

        let html = `<table id="matrixTableExport" class="w-full text-sm text-left border-collapse bg-white shadow-sm ring-1 ring-slate-200/50">`;
