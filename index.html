            <tr>
                <th class="px-4 py-3 border-r border-rose-400">NO TIKET</th>
                <th class="px-4 py-3 border-r border-rose-400">SEKTOR</th>
                <th class="px-4 py-3 border-r border-rose-400">STO</th>
                <th class="px-4 py-3 border-r border-rose-400">CUST ASSIGN</th>
                <th class="px-4 py-3 border-r border-rose-400">FLAG HVC</th>
                <th class="px-4 py-3 border-r border-rose-400">DATEK</th>
                <th class="px-4 py-3 border-r border-rose-400">NO JASTEL</th>
                <th class="px-4 py-3 border-r border-rose-400">TEKNISI 1</th>
                <th class="px-4 py-3 border-r border-rose-400">TEKNISI 2</th>
                <th class="px-4 py-3 text-center">AKSI</th>
            </tr>
        </thead><tbody class="divide-y divide-slate-100 bg-white">`;

        let data = getActiveData();
        
        // Siapkan opsi dropdown teknisi (Otomatis dibaca dari Data Kehadiran)
        let tekOptions = `<option value="">-- Pilih Teknisi --</option>`;
        if (rawKehadiranData && rawKehadiranData.length > 0) {
            let listTeknisi = [...new Set(rawKehadiranData.map(r => getVal(r, ['NAMA', 'NAMA TEKNISI'])).filter(n => n && n.trim() !== ''))].sort();
            tekOptions += listTeknisi.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        if (data.length === 0) {
            html += `<tr><td colspan="10" class="px-4 py-8 text-center text-slate-500 font-bold">Semua tiket telah di-order / Data kosong.</td></tr>`;
        } else {
            data.forEach((r, index) => {
                // Pencarian data agresif mengabaikan spasi dan huruf besar kecil
                let noTiket = getLooseVal(r, ["NOTIKET", "INCIDENT", "IN", "TIKET"]);
                let sektor = getLooseVal(r, ["SEKTOR", "SECTOR"]);
                let sto = getLooseVal(r, ["STO", "LOKASI"]);
                let custAssign = getLooseVal(r, ["CUSTASSIGN", "CUSTOMERASSIGN", "ASSIGN", "KETERANGAN"]);
                let flagHvc = getLooseVal(r, ["FLAGHVC", "HVC", "PRIORITAS"]);
                let datek = getLooseVal(r, ["DATEK", "REPORTDATE", "TGLLAPOR", "TANGGAL", "WAKTU"]);
                let noJastel = getLooseVal(r, ["NOJASTEL", "INET", "NOMORINET", "SPEEDY", "POTS"]);
                let tek1 = getLooseVal(r, ["TEKNISI1", "TEKNISIUTAMA", "TEKNISI"]);
                let tek2 = getLooseVal(r, ["TEKNISI2", "PENDAMPING"]);

                html += `<tr class="hover:bg-rose-50 transition-colors">
                    <td class="px-4 py-3 border-r border-slate-100 font-bold text-slate-800">${noTiket || "-"}</td>
                    <td class="px-4 py-3 border-r border-slate-100 text-xs">${sektor || "-"}</td>
                    <td class="px-4 py-3 border-r border-slate-100 text-xs font-bold text-indigo-700">${sto || "-"}</td>
                    <td class="px-4 py-3 border-r border-slate-100 text-xs">${custAssign || "-"}</td>
                    <td class="px-4 py-3 border-r border-slate-100 text-xs font-bold text-rose-600">${flagHvc || "-"}</td>
                    <td class="px-4 py-3 border-r border-slate-100 text-xs whitespace-nowrap">${datek || "-"}</td>
                    <td class="px-4 py-3 border-r border-slate-100 text-xs font-mono text-blue-600">${noJastel || "-"}</td>
                    <td class="px-2 py-2 border-r border-slate-100">
                        <select id="selTek1_${index}" class="w-full min-w-[120px] bg-white border border-slate-300 text-slate-700 rounded px-2 py-1 text-xs focus:ring-2 focus:ring-blue-500 font-bold">
                            ${tekOptions}
                        </select>
                    </td>
                    <td class="px-2 py-2 border-r border-slate-100">
                        <select id="selTek2_${index}" class="w-full min-w-[120px] bg-white border border-slate-300 text-slate-700 rounded px-2 py-1 text-xs focus:ring-2 focus:ring-blue-500 font-bold">
                            ${tekOptions}
                        </select>
                    </td>
                    <td class="px-2 py-2 text-center align-middle">
                        <button id="btnAssign_${index}" onclick="submitAssign(${index}, '${noTiket}')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-blue-700 hover:scale-105 transition-all shadow-sm flex items-center justify-center gap-1 mx-auto w-20">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            Order
                        </button>
                    </td>
                </tr>`;
            });
        }
        html += `</tbody></table>`;
        reportEl.innerHTML = html;
        return;
    } else {
        titleEl.innerHTML = 'Laporan Progres Tiket Gangguan (Matriks)';
    }

    let list = STO_LIST; 
    if (mode === 'SEKTOR') list = SEKTOR_LIST; 
    else if (mode === 'SA') list = SA_LIST;
    else if (mode === 'PEKANBARU') list = PEKANBARU_LIST; 
    else if (mode === 'DUMAI') list = DUMAI_LIST;
    else if (mode.startsWith('SA_')) {
        if (mode === 'SA_ARENGKA') list = SA_ARENGKA_LIST; else if (mode === 'SA_PBR_BARAT') list = SA_PBR_BARAT_LIST; else if (mode === 'SA_PBR_TIMUR') list = SA_PBR_TIMUR_LIST;
        else if (mode === 'SA_BUKIT_RAYA') list = SA_BUKIT_RAYA_LIST; else if (mode === 'SA_DUMAI') list = SA_DUMAI_LIST; else if (mode === 'SA_PANGKALAN_KERINCI') list = SA_PANGKALAN_KERINCI_LIST; else if (mode === 'SA_RENGAT') list = SA_RENGAT_LIST;
    }
    
    let tableColumns = [];
    if (['SEKTOR', 'SA_PBR_BARAT', 'SA_PBR_TIMUR', 'SA'].includes(mode)) tableColumns = [...list];
    else list.forEach(i => { if (i === 'PBR') tableColumns.push('PBRC 1', 'PBRC 2', 'PBRC 3', 'PBRC 4'); else tableColumns.push(i); });
    
    const reportData = {};
    [...tableColumns, 'TOTAL'].forEach(c => {
        reportData[c] = { h1: 0, hi: 0, cats: {} };
        categoryConfigs.forEach(cfg => reportData[c].cats[cfg.id] = { aging: Array(cfg.ranges.length).fill(0), open: 0, comply: 0, nok: 0, close: 0 });
    });

    const now = new Date();
    getActiveData().forEach(r => {
        let loc = null; let rSTO = (r["STO"] || "").toUpperCase(); let rSektor = (r["SEKTOR"] || "").toUpperCase();
        if (mode === 'SA') loc = tableColumns.find(c => getSA(r) === c);
        else if (['SEKTOR', 'SA_PBR_BARAT', 'SA_PBR_TIMUR'].includes(mode)) loc = tableColumns.find(c => mapSEKTOR(rSektor).includes(c));
        else {
            let cleanSektor = rSektor.replace(/\s/g, '');
            if (cleanSektor.includes("PBRC1") || cleanSektor.includes("PBB1")) loc = "PBRC 1"; 
            else if (cleanSektor.includes("PBRC2") || cleanSektor.includes("PBB2")) loc = "PBRC 2"; 
            else if (cleanSektor.includes("PBRC3") || cleanSektor.includes("PBB3")) loc = "PBRC 3"; 
            else if (cleanSektor.includes("PBRC4") || cleanSektor.includes("PBB4")) loc = "PBRC 4";
            else { 
                let m = mapSTO(rSTO); 
                if (m === 'PBR') loc = 'PBRC 1';
                else if (tableColumns.includes(m)) loc = m; 
            }
        }
        if (!loc) return;
        
        const cid = getTicketBucket(r); 
        const open = isTicketOpen(r); 
        
        let slaVal = (r.SLA || "").toUpperCase().trim();
        if (cid === "MANJA" && !open) {
            slaVal = getDurasiSeconds(r) <= 10800 ? "COMPLY" : "NOT COMPLY";
        }

        [loc, 'TOTAL'].forEach(k => {
            if (reportData[k].cats[cid]) {
                const cd = reportData[k].cats[cid];
                
                if (cid === "MANJA") {
                    if (isToday(r["JAM CUST ASSIGN"])) {
                        if (open) {
                            cd.open++; 
                            const hour = new Date(r["JAM CUST ASSIGN"]).getHours();
                            const cfgManja = categoryConfigs.find(c => c.id === "MANJA");
                            let matched = false;
                            for (let i = 0; i < cfgManja.ranges.length; i++) {
                                if (hour === cfgManja.ranges[i].h) { cd.aging[i]++; matched = true; break; }
                            }
                            if (!matched && hour > 17) cd.aging[cfgManja.ranges.length - 1]++;
                        } else { 
                            cd.close++; 
                            if (slaVal === "COMPLY") cd.comply++; else cd.nok++; 
                        }
                    }
                } else {
                    if (open) {
                        cd.open++; 
                        const hrs = getDurasiSeconds(r) / 3600; 
                        const cfg = categoryConfigs.find(c => c.id === cid);
                        let f = false; 
                        for (let i = 0; i < cfg.ranges.length; i++) if (hrs <= cfg.ranges[i].max) { cd.aging[i]++; f = true; break; }
                        if (!f) cd.aging[cfg.ranges.length - 1]++;
                    } else { 
                        cd.close++; 
                        if (slaVal === "COMPLY") cd.comply++; 
                        if (slaVal === "NOT COMPLY") cd.nok++; 
                    }
                }
            }
            
            if (getTicketAge(r) === "H-1") { reportData[k].h1++; }
            if (open && (!r["REPORT DATE"] || (now - new Date(r["REPORT DATE"])) / 864e5 <= 1095)) {
                reportData[k].hi++; 
            }
        });
    });

    let html = `<table id="matrixTableExport" class="w-full text-[11px] text-center border-collapse bg-white shadow-sm ring-1 ring-slate-200/50">`;

    if (!['SEKTOR', 'SA_PBR_BARAT', 'SA_PBR_TIMUR', 'SA'].includes(mode)) {
        let saGroups = []; let currSA = null; let count = 0;
        tableColumns.forEach(c => { let sa = SA_MAP[c] || 'OTHER'; if (sa !== currSA) { if (currSA) saGroups.push({ name: currSA, span: count }); currSA = sa; count = 1; } else count++; });
        if (currSA) saGroups.push({ name: currSA, span: count });
        
        html += `<thead class="sticky-header shadow-sm"><tr class="bg-[#5DADE2] text-slate-900 font-bold uppercase tracking-wider text-[10px]">
            <th class="px-3 py-3 border-r border-white/40 sticky-col bg-[#5DADE2] w-32 !z-[60] align-middle shadow-[2px_0_5px_rgba(0,0,0,0.1)]" rowspan="2">SERVICE AREA<br/>STO</th>`;
        saGroups.forEach(g => html += `<th class="px-3 py-2 border-r border-white/40 bg-[#7FB3D5] text-slate-900 align-middle" colspan="${g.span}">${g.name}</th>`);
        html += `<th class="px-3 py-3 border-l border-white/40 bg-[#5DADE2] w-16 text-slate-900 align-middle" rowspan="2">TOTAL</th></tr>
        <tr class="font-bold uppercase sticky-header-2 bg-[#7FB3D5] text-[9px] text-slate-800">`;
        tableColumns.forEach(c => html += `<th class="px-2 py-2 border-r border-white/40 min-w-[3.5rem] align-middle">${c}</th>`);
        html += `</tr></thead>`;
    } else {
        let headerText = mode === 'SA' ? 'SERVICE AREA' : 'SEKTOR';
        html += `<thead class="sticky-header shadow-sm"><tr class="bg-[#5DADE2] text-slate-900 font-bold uppercase tracking-wider text-[10px]">
            <th class="px-3 py-4 border-r border-white/40 sticky-col bg-[#5DADE2] w-32 !z-[60] align-middle shadow-[2px_0_5px_rgba(0,0,0,0.1)]">${headerText}</th>`;
        tableColumns.forEach(c => html += `<th class="px-2 py-4 border-r border-white/40 min-w-[3.5rem] bg-[#7FB3D5] text-slate-900 align-middle">${c}</th>`);
        html += `<th class="px-3 py-4 border-l border-white/40 bg-[#5DADE2] w-16 text-slate-900 align-middle">TOTAL</th></tr></thead>`;
    }
    html += `<tbody class="bg-white">`;

    let displayCats = categoryConfigs;
    if(ticketTypeMode==='REGULER') {
        displayCats = categoryConfigs.filter(x => ['HVC DIAMOND', 'HVC PLATINUM', 'MANJA', 'NON_HVC_GOLD', 'NON_HVC_REGULER'].includes(x.id));
    }
    else if(ticketTypeMode==='SQM') displayCats = categoryConfigs.filter(x => x.id === 'SQM');
    else if(ticketTypeMode==='Z_PERMINTAAN') displayCats = categoryConfigs.filter(x => x.id === 'Z_PERMINTAAN');
    else if(ticketTypeMode==='ALL_TIKET' || ticketTypeMode==='BELUM_ORDER') {
        // Hapus UNDERSPEC dari matriks standar agar tidak dobel karena memiliki format tabel yang berbeda
        displayCats = categoryConfigs.filter(x => x.id !== 'UNDERSPEC');
    }

    const getCell = (val, clickAction, activeText, activeBg) => {
        if (val > 0) {
            return `<td onclick="${clickAction}" class="cursor-pointer px-1 py-1.5 border-r border-slate-100 transition-all hover:bg-slate-200/50">
                        <div class="mx-auto min-w-[20px] px-1 py-0.5 flex items-center justify-center transition-all ${activeBg} ${activeText} font-black scale-110 shadow-sm rounded text-[10px] ring-1 ring-current">${val}</div>
                    </td>`;
        }
        return `<td onclick="${clickAction}" class="cursor-pointer px-1 py-1.5 border-r border-slate-100 transition-all hover:bg-slate-100">
                    <div class="mx-auto w-full h-full flex items-center justify-center text-slate-300 font-bold transition-all text-[10px]">0</div>
                </td>`;
    };

    const getTotalCell = (val, clickAction, activeText) => {
        if (val > 0) {
            return `<td onclick="${clickAction}" class="cursor-pointer px-2 py-1.5 border-l border-slate-200 transition-all hover:bg-slate-200 bg-slate-50">
                        <div class="mx-auto flex items-center justify-center ${activeText} font-black text-[11px] scale-110">${val}</div>
                    </td>`;
        }
        return `<td onclick="${clickAction}" class="cursor-pointer px-2 py-1.5 border-l border-slate-200 transition-all hover:bg-slate-200 bg-slate-50">
                    <div class="mx-auto flex items-center justify-center text-slate-400 font-bold text-[11px]">0</div>
                </td>`;
    };

    displayCats.forEach(c => {
        const isNoSLA = c.id === 'UNDERSPEC' || c.id === 'Z_PERMINTAAN';

        // Kategori Header - Menghapus sticky-col agar posisi teks rata tengah sempurna
        html += `<tr class="border-y border-slate-200">
                    <td colspan="${tableColumns.length + 2}" class="${c.bg} ${c.text} font-black uppercase tracking-widest text-[11px] px-4 py-3 text-center align-middle w-full shadow-[inset_0_0_5px_rgba(0,0,0,0.05)]">${c.label}</td>
                 </tr>`;
        
        c.ranges.forEach((rng, idx) => {
            let rowActiveText = 'text-amber-800';
            let rowActiveBg = 'bg-amber-100';

            if (c.id === 'HVC DIAMOND') {
                if (idx <= 2) { rowActiveText = 'text-emerald-800'; rowActiveBg = 'bg-emerald-200'; } // <= 3 Jam (Comply)
                else { rowActiveText = 'text-rose-800'; rowActiveBg = 'bg-rose-200'; } // > 3 Jam (Not Comply)
            } else if (c.id === 'HVC PLATINUM') {
                if (idx <= 3) { rowActiveText = 'text-emerald-800'; rowActiveBg = 'bg-emerald-200'; } // <= 6 Jam (Comply)

            } else if (c.id === 'NON_HVC_REGULER') {
                if (idx <= 4) { rowActiveText = 'text-emerald-800'; rowActiveBg = 'bg-emerald-200'; } // <= 36 Jam (Comply)

            html += `<tr class="border-b border-slate-100 hover:bg-blue-50/50 transition-colors group">

            tableColumns.forEach(col => {
                let v = reportData[col].cats[c.id].aging[idx];
                html += getCell(v, `openMatrixDetail('${col}', '${c.id}', 'AGING', ${idx})`, rowActiveText, rowActiveBg);

            let totalV = reportData['TOTAL'].cats[c.id].aging[idx];
            html += getTotalCell(totalV, `openMatrixDetail('TOTAL', '${c.id}', 'AGING', ${idx})`, rowActiveText);
            html += `</tr>`;
        });

        // TOTAL OPEN
        html += `<tr class="bg-indigo-50/40 border-b border-indigo-100 transition-colors hover:bg-indigo-100/50 group">
            <td class="px-4 py-2 text-left sticky-col bg-indigo-50/90 group-hover:bg-indigo-100/90 border-r border-indigo-200 font-black text-indigo-800 text-[10px] shadow-[2px_0_5px_rgba(99,102,241,0.05)]">TOTAL OPEN</td>`;
        tableColumns.forEach(col => {
            let v = reportData[col].cats[c.id].open;
            html += getCell(v, `openMatrixDetail('${col}', '${c.id}', 'OPEN')`, 'text-indigo-800', 'bg-indigo-200');
        });
        let totO = reportData['TOTAL'].cats[c.id].open;
        html += getTotalCell(totO, `openMatrixDetail('TOTAL', '${c.id}', 'OPEN')`, 'text-indigo-700');
        html += `</tr>`;

        if (!isNoSLA) {
            // COMPLY (Green)
            html += `<tr class="bg-emerald-50/40 border-b border-emerald-100 transition-colors hover:bg-emerald-100/50 group">
                <td class="px-4 py-2 text-left sticky-col bg-emerald-50/90 group-hover:bg-emerald-100/90 border-r border-emerald-200 font-black text-emerald-800 text-[10px] shadow-[2px_0_5px_rgba(16,185,129,0.05)]">COMPLY</td>`;
            tableColumns.forEach(col => {
                let v = reportData[col].cats[c.id].comply;
                html += getCell(v, `openMatrixDetail('${col}', '${c.id}', 'COMPLY')`, 'text-emerald-800', 'bg-emerald-200');
            });
            let totC = reportData['TOTAL'].cats[c.id].comply;
            html += getTotalCell(totC, `openMatrixDetail('TOTAL', '${c.id}', 'COMPLY')`, 'text-emerald-700');
            html += `</tr>`;

            // NOK COMPLY (Red)
            html += `<tr class="bg-red-50/40 border-b border-red-100 transition-colors hover:bg-red-100/50 group">
                <td class="px-4 py-2 text-left sticky-col bg-red-50/90 group-hover:bg-red-100/90 border-r border-red-200 font-black text-red-800 text-[10px] shadow-[2px_0_5px_rgba(239,68,68,0.05)]">NOK COMPLY</td>`;
            tableColumns.forEach(col => {
                let v = reportData[col].cats[c.id].nok;
                html += getCell(v, `openMatrixDetail('${col}', '${c.id}', 'NOT_COMPLY')`, 'text-red-800', 'bg-red-200');
            });
            let totN = reportData['TOTAL'].cats[c.id].nok;
            html += getTotalCell(totN, `openMatrixDetail('TOTAL', '${c.id}', 'NOT_COMPLY')`, 'text-red-700');
            html += `</tr>`;
        }

        // TOTAL CLOSE (Indigo)
        html += `<tr class="bg-indigo-50/40 border-b-2 border-indigo-200 transition-colors hover:bg-indigo-100/50 group">
            <td class="px-4 py-2 text-left sticky-col bg-indigo-50/90 group-hover:bg-indigo-100/90 border-r border-indigo-200 font-black text-indigo-800 text-[10px] shadow-[2px_0_5px_rgba(99,102,241,0.05)]">TOTAL CLOSE</td>`;
        tableColumns.forEach(col => {
            let v = reportData[col].cats[c.id].close;
            html += getCell(v, `openMatrixDetail('${col}', '${c.id}', 'CLOSE')`, 'text-indigo-800', 'bg-indigo-200');
        });
        let totCl = reportData['TOTAL'].cats[c.id].close;
        html += getTotalCell(totCl, `openMatrixDetail('TOTAL', '${c.id}', 'CLOSE')`, 'text-indigo-700');
        html += `</tr>`;
    });

    // BOTTOM SECTIONS (SALDO OPEN H-1, SISA SALDO HI, GAP, KLIRING)
    html += `<tr class="bg-slate-100/80 border-t-4 border-slate-300 transition-colors group">
        <td class="px-4 py-2.5 text-left sticky-col bg-slate-100/90 border-r border-slate-300 font-black text-slate-800 text-[10px] shadow-[2px_0_5px_rgba(0,0,0,0.05)]">SALDO OPEN H-1</td>`;
    tableColumns.forEach(c => {
        let v = reportData[c].h1;
        html += getCell(v, `openMatrixDetail('${c}', 'ALL', 'SALDO_H1')`, 'text-slate-800', 'bg-slate-300');
    });
    html += getTotalCell(reportData['TOTAL'].h1, `openMatrixDetail('TOTAL', 'ALL', 'SALDO_H1')`, 'text-slate-900');
    html += `</tr>`;

    html += `<tr class="bg-slate-100/80 border-b border-slate-300 transition-colors group">
        <td class="px-4 py-2.5 text-left sticky-col bg-slate-100/90 border-r border-slate-300 font-black text-slate-800 text-[10px] shadow-[2px_0_5px_rgba(0,0,0,0.05)]">SISA SALDO (HI)</td>`;
    tableColumns.forEach(c => {
        let v = reportData[c].hi;
        html += getCell(v, `openMatrixDetail('${c}', 'ALL', 'SALDO_HI')`, 'text-slate-800', 'bg-slate-300');
    });
    html += getTotalCell(reportData['TOTAL'].hi, `openMatrixDetail('TOTAL', 'ALL', 'SALDO_HI')`, 'text-slate-900');
    html += `</tr>`;

    html += `<tr class="bg-white border-b border-slate-300 transition-colors">
        <td class="px-4 py-2 text-left sticky-col bg-white border-r border-slate-300 font-black text-slate-700 text-[10px] shadow-[2px_0_5px_rgba(0,0,0,0.05)]">GAP</td>`;
    tableColumns.forEach(c => {
        const g = reportData[c].h1 - reportData[c].hi;
        const textC = g < 0 ? 'text-rose-600' : (g > 0 ? 'text-emerald-600' : 'text-slate-400');
        html += `<td class="px-2 py-2 border-r border-slate-200 font-black text-[11px] ${textC}">${g}</td>`;

// Helper function for Data Normalization (Standarisasi Kolom G-Sheets)
function normalizeRawData(data) {
    if (!Array.isArray(data)) return [];
    const normalized = data.map(row => {
        const newRow = { ...row }; // Salin data asli
        Object.keys(row).forEach(k => {
            let val = row[k];
            if (val === null || val === undefined || val === "") return;
            
            let cleanK = k.toUpperCase().trim().replace(/[^A-Z0-9]/g, '');
            
            // PRIORITAS 1: Tangkap format Waktu/Jam lebih dulu agar tidak menimpa field utama
            if(cleanK.includes('JAMCUSTASSIGN') || cleanK.includes('WAKTUASSIGN')) newRow["JAM CUST ASSIGN"] = val;
            else if(cleanK.includes('JAMTECHCLOSE') || cleanK.includes('AMTECHCLOSE') || cleanK.includes('JAMCLOSE') || cleanK.includes('WAKTUCLOSE') || cleanK.includes('TGLCLOSE') || cleanK.includes('DATEKCLOSE')) newRow["JAM TECH CLOSED"] = val;
            else if(cleanK.includes('DURASICLOSE') || cleanK.includes('DURASI')) newRow["DURASI CLOSE"] = val;
            else if(cleanK.includes('DATEK') || cleanK.includes('REPORTDATE') || cleanK.includes('TGLLAPOR') || cleanK === 'TANGGAL') { newRow["REPORT DATE"] = val; newRow["DATEK"] = val; }
            
            // PRIORITAS 2: Mapping field utama
            else if(cleanK.includes('NOTIKET') || cleanK.includes('INCIDENT') || cleanK === 'IN' || cleanK === 'TIKET') { newRow["NOTIKET"] = val; newRow["NO TIKET"] = val; }
            else if(cleanK.includes('STATUSTIKET') || cleanK === 'STATUS') newRow["STATUS TIKET"] = val;
            else if(cleanK.includes('KATEGORI')) newRow["KATEGORI TTR"] = val;
            else if(cleanK.includes('CUSTASSIGN') || cleanK.includes('CUSTOMER') || cleanK === 'ASSIGN') newRow["CUST ASSIGN"] = val;
            else if(cleanK.includes('TIPETIKET') || cleanK === 'TIPE') newRow["TIPE TIKET"] = val;
            else if(cleanK.includes('DETAIL') || cleanK.includes('KETERANGAN') || cleanK.includes('SUMMARY')) { newRow["DETAIL TIKET"] = val; newRow["KETERANGAN"] = val; }
            else if(cleanK.includes('FLAGHVC') || cleanK === 'HVC' || cleanK.includes('PRIORITAS')) newRow["FLAG HVC"] = val;
            else if(cleanK === 'SLA') newRow["SLA"] = val;
            else if(cleanK.includes('NOJASTEL') || cleanK.includes('NOMORINET') || cleanK === 'INET' || cleanK.includes('SPEEDY') || cleanK === 'POTS') newRow["NOMOR INET"] = val;
            else if(cleanK === 'TEKNISI1' || cleanK.includes('TEKNISIUTAMA') || cleanK === 'TEKNISI') newRow["TEKNISI 1"] = val;
            else if(cleanK === 'TEKNISI2' || cleanK.includes('PENDAMPING')) newRow["TEKNISI 2"] = val;
            else if(cleanK === 'STO' || cleanK.includes('LOKASI')) newRow["STO"] = val;
            else if(cleanK === 'SEKTOR' || cleanK === 'SECTOR') newRow["SEKTOR"] = val;
            else if(cleanK.includes('SERVICEAREA') || cleanK === 'SA') newRow["SERVICE AREA"] = val;
            else if(cleanK.includes('STATUSKENDALA') || cleanK === 'KENDALA') newRow["STATUS KENDALA"] = val;
            else if(cleanK.includes('ANALISA') || cleanK.includes('PENYEBAB')) newRow["ANALISA PENYEBAB GANGGUAN"] = val;
        });
        return newRow;
    });

    // FILTER PENTING: Hapus baris kosong/formula hantu (Penyebab Saldo 48.000+)
    return normalized.filter(r => {
        const noTiket = r["NO TIKET"] || r["NOTIKET"] || "";
        const noInet = r["NOMOR INET"] || r["INET"] || "";
        // Baris dianggap valid jika minimal punya No Tiket atau No Internet
        return noTiket.toString().trim() !== "" || noInet.toString().trim() !== "";
    });
}

async function load() {

                }
            }

        sUI.className = "flex items-center justify-center gap-2 text-slate-700 font-bold bg-slate-50 px-4 py-2.5 rounded-full shadow-sm border border-slate-200 text-xs w-full sm:w-auto whitespace-nowrap transition-colors";
    }
    
    try {
        // Menggunakan CSV Parser buatan kita agar lebih tangguh dan bypass layanan perantara yang lelet
        const [jsonDB, jsonTeknisi] = await Promise.all([
            fetchSheetAsJSON('DATADB'), 
            fetchSheetAsJSON('DB TEKNISI')
        ]);
        
        rawData = normalizeRawData(jsonDB || []);

        rawBelumOrderData = [];

        renderSidebar(); 
        updateDashboard();

        _lastLoadTs = Date.now();

        // ── Simpan ke localStorage untuk boot instan berikutnya ──
        try {
            if (jsonDB && jsonDB.length > 0) localStorage.setItem('__al_boot_DATADB', JSON.stringify(jsonDB));
            if (jsonTeknisi && jsonTeknisi.length > 0) localStorage.setItem('__al_boot_DBTEKNI', JSON.stringify(jsonTeknisi));
        } catch(e) {}
        
        if(sUI) {
            const timeStr = new Date().toLocaleTimeString('id-ID', { hour12: false });
            sUI.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_6px_#10b981]"></span> Updated: ${timeStr}`;
            sUI.className = "flex items-center justify-center gap-2 text-emerald-700 font-bold bg-emerald-50 px-4 py-2.5 rounded-full shadow-sm border border-emerald-200 text-xs w-full sm:w-auto whitespace-nowrap transition-colors";
        }
    } catch (e) { 
        console.error("Load Data Error:", e);
        if(sUI) {
            sUI.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_6px_#f43f5e]"></span> Offline Mode`;

        }
    }

function renderKPI() {

    data.forEach(r => {
        const op = isTicketOpen(r); if(getTicketAge(r)==="H-1") { h1o++; if(op) h1s++; else h1c++; }
        const rD = r["REPORT DATE"] ? new Date(r["REPORT DATE"]) : null;
        if(!rD || isNaN(rD.getTime()) || (now - rD) / 864e5 <= 1095) { h0o++; if(op) o3Y++; else h0c++; }
    });
    const opG = data.filter(r => isTicketOpen(r)).length, clG = data.filter(r => !isTicketOpen(r)).length;
    
    const cmp = data.filter(r => {
        if (isTicketOpen(r)) return false;
        const bkt = getTicketBucket(r);
        if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false; // DIKELUARKAN
        if (bkt === "MANJA") return getDurasiSeconds(r) <= 10800;
        return (r.SLA||"").toUpperCase().trim()==="COMPLY";
    }).length;
    
    const nok = data.filter(r => {
        if (isTicketOpen(r)) return false;
        const bkt = getTicketBucket(r);
        if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false; // DIKELUARKAN
        if (bkt === "MANJA") return getDurasiSeconds(r) > 10800;
        return (r.SLA||"").toUpperCase().trim()==="NOT COMPLY";
    }).length;

    document.getElementById('kpiOpen').innerText = opG; document.getElementById('kpiClose').innerText = clG;
    document.getElementById('kpiComply').innerText = cmp; document.getElementById('kpiNot').innerText = nok;
    document.getElementById('kpiSaldo').innerText = opG;
    document.getElementById('kpiSLA').innerText = (cmp+nok)>0 ? ((cmp/(cmp+nok))*100).toFixed(1)+"%" : "0%";
    document.getElementById('kpiH1_Open').innerText = h1o; document.getElementById('kpiH1_Close').innerText = h1c; document.getElementById('kpiH1_Saldo').innerText = h1s;
    document.getElementById('kpiH0_Open').innerText = h0o; document.getElementById('kpiH0_Close').innerText = h0c; document.getElementById('kpiH0_Saldo').innerText = o3Y;

        cats = ['HVC DIAMOND', 'HVC PLATINUM', 'MANJA', 'NON_HVC_GOLD', 'NON_HVC_REGULER'];
    } else if (ticketTypeMode === 'SQM') {
        cats = ['SQM'];
    } else if (ticketTypeMode === 'Z_PERMINTAAN') {
        cats = ['Z_PERMINTAAN'];
    } else if (ticketTypeMode === 'UNDERSPEC') {
        cats = ['UNDERSPEC'];
    } else {
        cats = ['HVC DIAMOND', 'HVC PLATINUM', 'MANJA', 'NON_HVC_GOLD', 'NON_HVC_REGULER', 'SQM', 'Z_PERMINTAAN', 'UNDERSPEC'];
    }
    
    let st = {}; cats.forEach(x => st[x] = { t: 0, o: 0, c: 0, comp: 0, nok: 0 });
    
    d.forEach(r => { 
        const b = getTicketBucket(r); 
        if (st[b]) { 
            st[b].t++; 
            const open = isTicketOpen(r);
            if (open) st[b].o++; else st[b].c++; 
            
            // DIKELUARKAN JIKA UNDERSPEC / PERMINTAAN
            if (!open && b !== 'UNDERSPEC' && b !== 'Z_PERMINTAAN') {
                let isC = (r.SLA || "").toUpperCase().trim() === "COMPLY";
                if (b === "MANJA") isC = getDurasiSeconds(r) <= 10800;
                if (b === "NON_HVC_GOLD" || b === "NON_HVC_REGULER") isC = isNonHvcComply(r, b);
                if (isC) st[b].comp++; else st[b].nok++;
            }
        } 
    });

    // Update Grid Columns dinamis
    c.className = `grid grid-cols-1 md:grid-cols-2 lg:grid-cols-${Math.min(cats.length, 5)} gap-5 mb-8`;

    c.innerHTML = cats.map(k => {
        const bg = distClassMap[k] || distClassMap['NON_HVC_REGULER'];
        const label = k === 'NON_HVC_GOLD' ? 'GOLD (12 JAM)' : k === 'NON_HVC_REGULER' ? 'REGULER (24 JAM)' : k.replace('_',' ');
        const isNoSLA = k === 'UNDERSPEC' || k === 'Z_PERMINTAAN';
        
        let slaHtml = isNoSLA ? '' : `
            <div class="w-full bg-white/90 rounded-lg px-3 py-2 flex text-[9px] font-black uppercase shadow-sm mt-2">
                <div onclick="event.stopPropagation(); openDistribution('COMPLY', '${k}')" class="flex-1 flex justify-between items-center pr-3 border-r border-slate-200/60 hover:scale-105 transition-transform cursor-pointer"><span class="text-slate-800">COMPLY</span><span class="text-emerald-600 text-xs">${st[k].comp}</span></div>
                <div onclick="event.stopPropagation(); openDistribution('NOT COMPLY', '${k}')" class="flex-1 flex justify-between items-center pl-3 hover:scale-105 transition-transform cursor-pointer"><span class="text-slate-800">NOT COMP</span><span class="text-rose-600 text-xs">${st[k].nok}</span></div>
            </div>`;
            
        return `
        <div onclick="openDistribution('ALL', '${k}')" class="cursor-pointer rounded-2xl p-5 border shadow-sm transition-all hover:shadow-md hover:-translate-y-1 bg-gradient-to-br ${bg} flex flex-col items-center justify-center text-center">
            <span class="font-extrabold text-[11px] mb-2 uppercase tracking-widest opacity-90">${label}</span>
            <b class="text-5xl font-black mb-5">${st[k].t}</b>
            <div class="w-full flex flex-col gap-2">
                <div class="w-full bg-white/90 rounded-lg px-3 py-2 flex text-[9px] font-black uppercase shadow-sm">
                    <div onclick="event.stopPropagation(); openDistribution('OPEN', '${k}')" class="flex-1 flex justify-between items-center pr-3 border-r border-slate-200/60 hover:scale-105 transition-transform cursor-pointer"><span class="text-slate-800">OPEN</span><span class="text-rose-600 text-xs">${st[k].o}</span></div>
                    <div onclick="event.stopPropagation(); openDistribution('CLOSE', '${k}')" class="flex-1 flex justify-between items-center pl-3 hover:scale-105 transition-transform cursor-pointer"><span class="text-slate-800">CLOSE</span><span class="text-emerald-600 text-xs">${st[k].c}</span></div>
                </div>
                ${slaHtml}
            </div>
        </div>`;
    }).join("");
}

function renderGrid() {
    const gridEl = document.getElementById('grid'); if (!gridEl) return;
    
    let list = STO_LIST; 
    let isSektorRender = false;
    let isSARender = false;
    
    if (mode === 'SEKTOR') { list = SEKTOR_LIST; isSektorRender = true; } 
    else if (mode === 'SA') { list = SA_LIST; isSARender = true; }
    else if (mode === 'PEKANBARU') list = PEKANBARU_LIST; 
    else if (mode === 'DUMAI') list = DUMAI_LIST;
    else if (mode.startsWith('SA_')) {
        if (mode === 'SA_ARENGKA') list = SA_ARENGKA_LIST;
        else if (mode === 'SA_PBR_BARAT') { list = SA_PBR_BARAT_LIST; isSektorRender = true; }
        else if (mode === 'SA_PBR_TIMUR') { list = SA_PBR_TIMUR_LIST; isSektorRender = true; }
        else if (mode === 'SA_BUKIT_RAYA') list = SA_BUKIT_RAYA_LIST;
        else if (mode === 'SA_DUMAI') list = SA_DUMAI_LIST;
        else if (mode === 'SA_PANGKALAN_KERINCI') list = SA_PANGKALAN_KERINCI_LIST;
        else if (mode === 'SA_RENGAT') list = SA_RENGAT_LIST;
    }

    const baseData = getBaseData();
    gridEl.innerHTML = list.map(item => {
        const locData = baseData.filter(r => {
            if (isSARender) return getSA(r) === item;
            const val = (isSektorRender ? r.SEKTOR : r.STO) || r.LOKASI;
            if (!val) return false;
            return isSektorRender ? mapSEKTOR(val).includes(item) : mapSTO(val) === item;
        });

        if(locData.length === 0 && (mode === 'SEKTOR' || mode === 'SA')) return ''; 

        const openCount = locData.filter(r => isTicketOpen(r)).length;
        const closeCount = locData.filter(r => !isTicketOpen(r)).length;
        
        const complyCount = locData.filter(r => {
            if (isTicketOpen(r)) return false;
            const bkt = getTicketBucket(r);
            if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false; // DIKELUARKAN
            if (bkt === "MANJA") return getDurasiSeconds(r) <= 10800;
            return (r.SLA || "").toString().toUpperCase().trim() === "COMPLY";
        }).length;
        
        const notComplyCount = locData.filter(r => {
            if (isTicketOpen(r)) return false;
            const bkt = getTicketBucket(r);
            if (bkt === 'UNDERSPEC' || bkt === 'Z_PERMINTAAN') return false; // DIKELUARKAN
            if (bkt === "MANJA") return getDurasiSeconds(r) > 10800;
            return (r.SLA || "").toString().toUpperCase().trim() === "NOT COMPLY";
        }).length;

        const platOpen = locData.filter(r => getTicketBucket(r) === 'HVC PLATINUM' && isTicketOpen(r)).length;
        const diamOpen = locData.filter(r => getTicketBucket(r) === 'HVC DIAMOND' && isTicketOpen(r)).length;
        const manjaOpen = locData.filter(r => getTicketBucket(r) === 'MANJA' && isTicketOpen(r)).length;
        const nonHvcGoldOpen = locData.filter(r => getTicketBucket(r) === 'NON_HVC_GOLD' && isTicketOpen(r)).length;
        const nonHvcRegOpen = locData.filter(r => getTicketBucket(r) === 'NON_HVC_REGULER' && isTicketOpen(r)).length;
        const sqmOpen = locData.filter(r => getTicketBucket(r) === 'SQM' && isTicketOpen(r)).length;
        const zperOpen = locData.filter(r => getTicketBucket(r) === 'Z_PERMINTAAN' && isTicketOpen(r)).length;

                 class="flex justify-between items-center text-[9px] font-black uppercase cursor-pointer hover:bg-white/60 px-1.5 py-0.5 rounded transition-colors">

            </div>`;
        };

        const topBorderClass = isRed ? 'bg-rose-500' : 'bg-emerald-400';
        const iconHTML = isRed 
            ? `<span class="text-rose-500 bg-white shadow-sm rounded-full p-1.5 flex items-center justify-center"><span class="flex h-2.5 w-2.5 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500"></span></span></span>`
            : `<span class="text-emerald-500 bg-white shadow-sm rounded-full p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></span>`;

        let slaGridHtml = '';
        if (ticketTypeMode !== 'UNDERSPEC' && ticketTypeMode !== 'Z_PERMINTAAN') {
            slaGridHtml = `
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div onclick="openLocation('${item}', 'COMPLY')" class="bg-white hover:bg-blue-50 px-2 py-1.5 rounded-lg shadow-sm flex justify-between items-center cursor-pointer transition-colors">
                    <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">Comply</span>
                    <span class="font-black text-sm text-blue-700">${complyCount}</span>
                </div>

                    <span class="text-[9px] font-black text-rose-500 uppercase tracking-widest">Not Comp</span>
                    <span class="font-black text-sm text-rose-600">${notComplyCount}</span>
                </div>

        }

        return `
            <div class="bg-gradient-to-br from-[#5DADE2] to-[#7FB3D5] rounded-2xl shadow-sm border border-[#7FB3D5]/50 transition-all duration-300 relative overflow-hidden flex flex-col hover:shadow-md hover:-translate-y-1 group/card">
                <div class="absolute top-0 left-0 w-full h-1.5 ${topBorderClass} z-20"></div>
                <div class="p-5 flex flex-col h-full mt-1 relative z-10">
                    <div onclick="openLocation('${item}', 'ALL')" class="flex justify-between items-center mb-4 cursor-pointer group">
                        <h4 class="font-black text-xl text-white group-hover:text-blue-50 transition-colors drop-shadow-md">${item}</h4>
                        ${iconHTML}
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div onclick="openLocation('${item}', 'OPEN')" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform">
                            <span class="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-1">Saldo</span>
                            <span class="text-3xl font-black text-rose-600">${openCount}</span>
                        </div>
                        <div onclick="openLocation('${item}', 'CLOSE')" class="bg-white p-3 rounded-xl shadow-sm flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform">
                            <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">Close</span>
                            <span class="text-3xl font-black text-emerald-600">${closeCount}</span>
                        </div>
                    </div>
                    ${slaGridHtml}
                    <div class="pt-2 mt-auto bg-white/40 backdrop-blur-sm rounded-xl p-2 grid grid-cols-2 gap-x-2 gap-y-1 shadow-inner border border-white/50">
                        ${getBadgeHTML('DIAMOND', diamOpen, 'text-blue-800', 'HVC DIAMOND')}
                        ${getBadgeHTML('PLATINUM', platOpen, 'text-purple-800', 'HVC PLATINUM')}
                        ${getBadgeHTML('MANJA', manjaOpen, 'text-teal-800', 'MANJA')}
                        ${getBadgeHTML('GOLD', nonHvcGoldOpen, 'text-emerald-800', 'NON_HVC_GOLD')}
                        ${getBadgeHTML('REGULER', nonHvcRegOpen, 'text-sky-800', 'NON_HVC_REGULER')}
                        ${getBadgeHTML('SQM', sqmOpen, 'text-rose-800', 'SQM')}
                        ${getBadgeHTML('Z PERM', zperOpen, 'text-indigo-800', 'Z_PERMINTAAN')}
                        <div class="col-span-2 mt-1 pt-1 border-t border-white/50">
                            ${getBadgeHTML('UNSPEC', undOpen, 'text-slate-800', 'UNDERSPEC')}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join("");
}

function renderRank() {
    const m = {}; getActiveData().forEach(r => { 
        if(isTicketOpen(r)) return; 
        const bkt = getTicketBucket(r);
        
        // DIKELUARKAN JIKA UNDERSPEC / PERMINTAAN
        let nok = false;
        if (bkt !== 'UNDERSPEC' && bkt !== 'Z_PERMINTAAN') {
            nok = (r.SLA||"").toUpperCase().trim()==="NOT COMPLY";
            if (bkt === "MANJA") nok = getDurasiSeconds(r) > 10800;
        }

        [r["TEKNISI 1"], r["TEKNISI 2"]].forEach(t => { if(t && t.trim()){ if(!m[t]) m[t]={t:0,n:0}; m[t].t++; if(nok) m[t].n++; } }); 
    });
    const l = Object.entries(m).map(([n,v]) => ({ n, total:v.t })).sort((a,b)=>a.total-b.total).slice(0, 10);
    const rk = document.getElementById('rank'); if(!rk) return;
    rk.innerHTML = l.length > 0 ? l.map((r, i) => `<div onclick="openTeknisi('${r.n.replace(/'/g, "\\'")}')" class="flex justify-between items-center p-3 rounded-xl border bg-white cursor-pointer hover:scale-[1.02] transition-transform shadow-sm"><div class="flex items-center gap-3"><span class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center font-black text-xs text-slate-500 border border-slate-200 shadow-sm">#${i+1}</span><span class="truncate font-bold text-xs max-w-[120px]" title="${extractName(r.n)}">${extractName(r.n)}</span></div><span class="font-black text-[11px] text-rose-600 bg-rose-50 px-2 py-1 rounded-lg border border-rose-100 shadow-sm">${r.total} Tiket</span></div>`).join("") : "<div class='text-center text-slate-400'>Data kosong</div>";
}

function getPodium(m) {
    const l = Object.entries(m).map(([n,v]) => ({ n, total:v.t })).sort((a,b)=>b.total-a.total);
    if(l.length===0) return "<div class='text-slate-400 font-medium italic p-4'>Data tidak cukup</div>";
    const top = l.slice(0, 3);
    const modernMedals = [
        `<div class="w-14 h-14 rounded-full bg-gradient-to-tr from-amber-200 via-yellow-400 to-yellow-500 p-1 mb-3 shadow-[0_4px_15px_rgba(251,191,36,0.6)] relative flex-shrink-0 z-10 hover:scale-110 transition-transform"><div class="w-full h-full bg-gradient-to-br from-yellow-100 to-amber-200 rounded-full flex items-center justify-center border-2 border-yellow-300/50"><span class="text-amber-700 font-black text-xl">1</span></div></div>`,
        `<div class="w-12 h-12 rounded-full bg-gradient-to-tr from-slate-200 via-slate-400 to-slate-500 p-1 mb-3 shadow-[0_4px_15px_rgba(148,163,184,0.4)] relative flex-shrink-0 z-10 hover:scale-110 transition-transform"><div class="w-full h-full bg-gradient-to-br from-slate-50 to-slate-200 rounded-full flex items-center justify-center border-2 border-slate-300/50"><span class="text-slate-600 font-black text-lg">2</span></div></div>`,
        `<div class="w-12 h-12 rounded-full bg-gradient-to-tr from-orange-200 via-orange-400 to-orange-500 p-1 mb-3 shadow-[0_4px_15_rgba(249,115,22,0.4)] relative flex-shrink-0 z-10 hover:scale-110 transition-transform"><div class="w-full h-full bg-gradient-to-br from-orange-50 to-orange-200 rounded-full flex items-center justify-center border-2 border-orange-300/50"><span class="text-orange-700 font-black text-lg">3</span></div></div>`
    ];
    let podiumOrder = [];
    if (top.length === 1) podiumOrder = [{...top[0], idx: 0}];
    else if (top.length === 2) podiumOrder = [{...top[1], idx: 1}, {...top[0], idx: 0}];
    else podiumOrder = [{...top[1], idx: 1}, {...top[0], idx: 0}, {...top[2], idx: 2}];
    const st = ["from-amber-50 to-yellow-100 border-yellow-200","from-slate-50 to-slate-100 border-slate-200","from-orange-50 to-orange-100 border-orange-200"];
    const heights = ["h-36", "h-32", "h-28"];
    return `<div class="flex items-end justify-center gap-3 w-full h-full pt-4">` + podiumOrder.map(t => `
        <div onclick="openTeknisi('${t.n.replace(/'/g, "\\'")}')" class="flex-1 cursor-pointer bg-gradient-to-b ${st[t.idx]} p-3 rounded-t-2xl rounded-b-lg border shadow-sm flex flex-col items-center justify-end text-center ${heights[t.idx]} hover:-translate-y-2 transition-transform relative">
            <div class="absolute -top-8">${modernMedals[t.idx]}</div>
            <span class="font-black text-[9px] sm:text-[10px] uppercase mb-2 line-clamp-2 w-full leading-tight text-slate-800" title="${extractName(t.n)}">${extractName(t.n)}</span>
            <span class="bg-white px-2 py-1.5 rounded-lg text-[10px] font-black shadow-sm border border-slate-100 text-blue-700 w-full">${t.total} Close</span>
        </div>`).join('') + `</div>`;
}

function renderMonitoringView() {
    let d = getActiveData(); const tb = document.getElementById('monitoringTableBody'); if(!tb) return;
    const gr = {}; const sC = {};
    d.forEach(r => {
        let t1=(r["TEKNISI 1"]||"").trim(), t2=(r["TEKNISI 2"]||"").trim(); if(!t1 && !t2) return;
        
        let s = "UNKNOWN";
        if (mode === 'SA') {
            s = getSA(r);
        } else if (mode === 'SEKTOR' || mode.startsWith('SA_PBR_')) {
            s = mapSEKTOR(r.SEKTOR || r.LOKASI)[0] || "UNKNOWN";
        } else {
            s = mapSTO(r["STO"] || r["LOKASI"] || "UNKNOWN");
            let sek = (r["SEKTOR"] || "").toUpperCase().replace(/\s/g, '');
            if (sek.includes("PBRC1") || sek.includes("PBB1")) s = "PBRC 1";
            else if (sek.includes("PBRC2") || sek.includes("PBB2")) s = "PBRC 2";
            else if (sek.includes("PBRC3") || sek.includes("PBB3")) s = "PBRC 3";
            else if (sek.includes("PBRC4") || sek.includes("PBB4")) s = "PBRC 4";
            else if (s === 'PBR') s = "PBRC 1";
        }
        
        let k = t1 + "|||" + t2; 
        if(!gr[s]) gr[s]={}; 
        if(!gr[s][k]) gr[s][k]={cl:[],o:0}; 
        if(!sC[s]) sC[s]=Array(12).fill(0);
        
        if(isTicketOpen(r)) {
            gr[s][k].o++;
        } else { 
            const rt = r["JAM TECH CLOSED"]||r["AM TECH CLOSE"]; 
            if(rt) { 
                const dt=new Date(rt); 
                if(!isNaN(dt.getTime())){ 
                    const hr=dt.getHours(); 
                    gr[s][k].cl.push({inc:r.NOTIKET,hr}); 
                    sC[s][Math.floor(hr/2)]++; 
                } 
            } 
        }
    });
    
    if(window.chartMonitoringInst) window.chartMonitoringInst.destroy();
    const ctx = document.getElementById('chartMonitoringTrend');
    if(ctx) window.chartMonitoringInst = new Chart(ctx, { type:'bar', data: { labels: ["00-02","02-04","04-06","06-08","08-10","10-12","12-14","14-16","16-18","18-20","20-22","22-00"], datasets: Object.keys(sC).sort().map((s,i)=>({label:s,data:sC[s],backgroundColor:['#3b82f6','#10b981','#f59e0b','#f43f5e','#8b5cf6'][i%5],borderRadius:4})) }, options: { responsive:true, maintainAspectRatio:false, scales:{y:{suggestedMax:20}} } });
    
    let h=''; 
    const sk = Object.keys(gr).sort(); 
    
    let grandTotalTim = 0;
    let grandTotalClose = 0;
    let grandTotalSess = Array(12).fill(0);

    sk.forEach(s => {
        const ex = expandedSektors.has(s); 
        
        let totalCloseArea = 0;
        let sessTotals = Array(12).fill(0);
        let countTim = Object.keys(gr[s]).length;
        
        grandTotalTim += countTim;

        Object.keys(gr[s]).forEach(tk => {
            totalCloseArea += gr[s][tk].cl.length;
            gr[s][tk].cl.forEach(t => {
                let bIdx = Math.floor(t.hr / 2);
                if (bIdx >= 0 && bIdx <= 11) sessTotals[bIdx]++;
            });
        });
        
        grandTotalClose += totalCloseArea;
        for(let i=0; i<12; i++) grandTotalSess[i] += sessTotals[i];
        
        let sessHTML = sessTotals.map(tot => {
            return `<td class="px-2 py-3 text-center border-b border-slate-100 border-l font-bold text-[10px] ${tot > 0 ? 'text-emerald-600 bg-emerald-50/50' : 'text-slate-300'}">${tot > 0 ? tot : '-'}</td>`;
        }).join('');
        
        h+=`<tr class="bg-slate-50 cursor-pointer hover:bg-blue-50 transition-colors" onclick="toggleSektor('${s.replace(/'/g, "\\'")}')">
                <td class="px-4 py-3 font-black text-blue-700 border-r border-b border-slate-100 whitespace-nowrap">${s} ${ex?'▲':'▼'}</td>
                <td class="px-4 py-3 border-b border-slate-100">
                    <div class="flex items-center justify-between gap-2 text-xs">
                        <span class="font-bold text-slate-500">${countTim} Tim</span>
                        <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-md font-black shadow-sm flex items-center gap-1 border border-emerald-200">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                            ${totalCloseArea}
                        </span>
                    </div>
                </td>
                ${sessHTML}
            </tr>`;
            
        if(ex) {
            Object.keys(gr[s]).sort().forEach(tk => {
                const inf = gr[s][tk]; 
                const pts = tk.split("|||"); 
                const getB = (h1,h2) => inf.cl.filter(t => t.hr>=h1 && t.hr<=h2).map(t => `<div class="text-[9px] bg-blue-50 p-1 rounded mb-1 text-center font-bold text-blue-700 border border-blue-200">${t.inc}</div>`).join('');
                let t1Name = extractName(pts[0]);

// Fungsi untuk mengirim data Assign Teknisi ke Google Script
async function submitAssign(rowIndex, noTiket) {
    const selTek1 = document.getElementById(`selTek1_${rowIndex}`);
    const selTek2 = document.getElementById(`selTek2_${rowIndex}`);
    const btn = document.getElementById(`btnAssign_${rowIndex}`);
    
    const tek1 = selTek1.value;
    const tek2 = selTek2.value;

    if (!tek1 && !tek2) {
        showToast("Silakan pilih minimal 1 Teknisi (Teknisi 1).");
        return;
    }

    // Tampilan Loading di Tombol
    const originalBtnHTML = btn.innerHTML;
    btn.innerHTML = `<span class="animate-spin text-sm">⏳</span>`;
    btn.disabled = true;
    selTek1.disabled = true;
    selTek2.disabled = true;

    try {
        // Simulasi delay sementara sebagai pengganti Google Script yang sudah dihapus
        await new Promise(r => setTimeout(r, 400));

        // Tampilkan Sukses!
        showToast(`Tiket ${noTiket} berhasil di-Order!`);
        btn.innerHTML = `✅ OK`;
        btn.classList.replace('bg-blue-600', 'bg-emerald-600');
        btn.classList.replace('hover:bg-blue-700', 'hover:bg-emerald-700');
        
    } catch (e) {
        showToast("Terjadi kesalahan. Gagal Assign.");
        btn.innerHTML = originalBtnHTML;
        btn.disabled = false;
        selTek1.disabled = false;
        selTek2.disabled = false;
    }
}

        // 1. OPTIMASI: PRE-RENDER DATALIST SECARA GLOBAL (Dibuat sekali saja saat awal buka)
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('datalistsContainer');
            let datalistsHTML = '';
            for (const [sektorId, listNama] of Object.entries(DB_TEKNISI)) {
                let optionsHtml = '';
                listNama.forEach(nama => optionsHtml += `<option value="${nama}"></option>`);
                datalistsHTML += `<datalist id="dl_${sektorId}">${optionsHtml}</datalist>`;
            }
            container.innerHTML = datalistsHTML;
        });

        // Mapping sheet name ke ID datalist yang sudah dibuat di atas
        function getDatalistId(sheetName) {
            const name = sheetName.toUpperCase();
            if (name.includes("INDRAGIRI")) return "dl_INDRAGIRI";
            if (name.includes("PBR")) return "dl_PBR";
            if (name.includes("DUM") || name.includes("DRI")) return "dl_DUMAI_DURI";
            if (name.includes("BKR") || name.includes("OUTER-2")) return "dl_BKR_OUTER2";
            if (name.includes("ARENGKA")) return "dl_ARENGKA";
            if (name.includes("OUTER-1")) return "dl_OUTER1";
            return null;
        }

        const apiUrlInput = document.getElementById('apiUrl');
        const btnFetch = document.getElementById('btnFetch');
        const mainLoader = document.getElementById('mainLoader');
        const bgSyncText = document.getElementById('bgSyncText');
        const statusText = document.getElementById('statusText');
        const emptyState = document.getElementById('emptyState');
        const tableContainer = document.getElementById('tableContainer');
        const tableBody = document.getElementById('ticketsTableBody');
        const totalBadge = document.getElementById('totalBadge'); 
        
        let isRealTime = false;
        let countdownId = null;
        let secondsLeft = 15; 
        let isEditingTableRow = false; 
        
        // --- OPTIMASI BARU (ANTI-LELET) ---
        let isFetching = false; // Mencegah penumpukan request
        let lastDataHash = "";  // Menyimpan jejak data untuk mencegah render ulang sia-sia
        let allTicketsData = []; // Simpan semua tiket asli dari server

        function setStatus(text, isError = false) {
            statusText.textContent = text;
            statusText.className = `text-sm font-medium ${isError ? 'text-red-600' : 'text-green-600'}`;
            statusText.classList.remove('hidden');
        }

        async function fetchTickets(isAutoRefresh = false) {
            const url = apiUrlInput.value.trim();
            if (!url) { if(!isAutoRefresh) alert('URL Web App tidak boleh kosong!'); return; }
            
            // Cegah sinkronisasi jika user sedang mengetik/memilih teknisi, ATAU jika masih ada proses fetch yang belum selesai
            if ((isAutoRefresh && isEditingTableRow) || isFetching) return; 

            isFetching = true; // Kunci: Tandai bahwa sistem sedang mengambil data

            // UI State loading (Lebih halus untuk auto refresh)
            if (!isAutoRefresh) {
                btnFetch.disabled = true;
                btnFetch.classList.add('opacity-70');
                mainLoader.classList.remove('hidden');
                tableContainer.classList.add('hidden');
                emptyState.classList.add('hidden');
                totalBadge.classList.add('hidden');
            } else {
                bgSyncText.classList.remove('hidden'); // Indikator halus
            }
            statusText.classList.add('hidden');

            try {
                const response = await fetch(url);
                const result = await response.json();

                // Double check memastikan user belum mulai mengetik saat proses fetch berlangsung
                if (isAutoRefresh && isEditingTableRow) {
                    bgSyncText.classList.add('hidden');
                    isFetching = false; // Lepas kunci
                    return; 
                }

                if (result.status === 'success') {
                    // === FILTER DATA: HANYA NO TIKET ADA & TEKNISI 1 KOSONG ===
                    const validTickets = result.data.filter(tiket => {
                        const rawNoTiket = tiket.NO_TIKET || tiket['NO TIKET'] || tiket.NOTIKET || tiket.INCIDENT || tiket['NO INCIDENT'] || '';
                        const hasNoTiket = rawNoTiket.toString().trim() !== '';
                        
                        const rawTeknisi1 = tiket['TEKNISI 1'] || tiket.TEKNISI_1 || tiket.TEKNISI1 || tiket.TEKNISI || '';
                        const strTeknisi = rawTeknisi1.toString().trim().toUpperCase();
                        const teknisiKosong = strTeknisi === '' || strTeknisi === '-' || strTeknisi === '0' || strTeknisi.includes('N/A') || strTeknisi.includes('#REF');
                        
                        return hasNoTiket && teknisiKosong;
                    });

                    // === SMART RENDER (ANTI-LAG) ===
                    // Cek apakah data benar-benar berubah sebelum merusak/merender ulang tabel
                    const currentDataHash = JSON.stringify(validTickets);
                    
                    if (isAutoRefresh && currentDataHash === lastDataHash) {
                        // Data sama persis, abaikan proses render untuk menghemat resource browser
                        bgSyncText.classList.add('hidden');
                    } else {
                        // Data berbeda, simpan jejak baru lalu render tabel
                        lastDataHash = currentDataHash; 
                        allTicketsData = validTickets; // Simpan ke global memory
                        setStatus(`Berhasil memuat ${validTickets.length} tiket (Belum di-assign).`);
                        applyFilter(); // Panggil fungsi filter dan render 
                    }
                } else {
                    setStatus(`Gagal: ${result.message}`, true);
                    if (!isAutoRefresh) {
                        emptyState.classList.remove('hidden');
                        emptyState.querySelector('h3').textContent = "Terjadi Kesalahan";
                        emptyState.querySelector('p').textContent = result.message;
                    }
                }
            } catch (error) {
                setStatus(`Network Error.`, true);
                if (!isAutoRefresh) {
                    emptyState.classList.remove('hidden');
                    emptyState.querySelector('h3').textContent = "Gagal Terhubung";
                }
            } finally {
                isFetching = false; // Wajib dilepas agar Auto-Refresh berikutnya bisa jalan
                if (!isAutoRefresh) {
                    btnFetch.disabled = false;
                    btnFetch.classList.remove('opacity-70');
                    mainLoader.classList.add('hidden');
                } else {
                    bgSyncText.classList.add('hidden');
                }
            }
        }

        // FUNGSI UNTUK MENERAPKAN FILTER AREA/SHEET & CUST ASSIGN
        function applyFilter() {
            const selectedSheet = document.getElementById('sheetFilter').value;
            const selectedCustAssign = document.getElementById('custAssignFilter').value;
            
            let dataToRender = allTicketsData;
            
            if (selectedSheet !== 'ALL') {
                dataToRender = dataToRender.filter(tiket => {
                    const sheetName = (tiket.NAMA_SHEET || '').toUpperCase();
                    // Hapus spasi dan tanda '&' agar pencocokan lebih fleksibel/kebal terhadap salah ketik nama sheet
                    const filterValue = selectedSheet.toUpperCase().replace(/&/g, '').replace(/\s+/g, '');
                    const sheetNameClean = sheetName.replace(/&/g, '').replace(/\s+/g, '');
                    return sheetNameClean.includes(filterValue);
                });
            }

            if (selectedCustAssign !== 'ALL') {
                dataToRender = dataToRender.filter(tiket => {
                    const ticketText = Object.values(tiket).join(" ").toUpperCase();
                    // Pencarian Z PERMINTAAN menggunakan variasi spasi atau underscore
                    if (selectedCustAssign === 'Z_PERMINTAAN') {
                        return ticketText.includes('Z_PERMINTAAN') || ticketText.includes('Z PERMINTAAN');
                    }
                    return ticketText.includes(selectedCustAssign);
                });
            }
            
            renderTable(dataToRender);
        }

        // 2. OPTIMASI RENDER: MENGGUNAKAN BATCH HTML STRING (Jauh lebih cepat dari DOM appendChild satu-satu)
        function renderTable(tickets) {
            if (!tickets || tickets.length === 0) {
                emptyState.classList.remove('hidden');
                tableContainer.classList.add('hidden');
                totalBadge.classList.add('hidden');
                tableBody.innerHTML = '';
                return;
            }

            tableContainer.classList.remove('hidden');
            totalBadge.textContent = tickets.length;
            totalBadge.classList.remove('hidden');

            const PRIORITAS_TOP = ["TTR 3 JD", "TTR 6 JP", "TTR 3 JM", "TTR 12 JG", "TTR 36 J", "SQM", "Z_PERMINTAAN", "MANUAL"];

            tickets.sort((a, b) => {
                const textA = Object.values(a).join(" ").toUpperCase();
                const textB = Object.values(b).join(" ").toUpperCase();
                let scoreA = 999; let scoreB = 999;
                for (let i = 0; i < PRIORITAS_TOP.length; i++) {
                    if (scoreA === 999 && textA.includes(PRIORITAS_TOP[i])) scoreA = i;
                    if (scoreB === 999 && textB.includes(PRIORITAS_TOP[i])) scoreB = i;
                }
                return scoreA - scoreB;
            });

            // Merakit HTML ke dalam variabel text terlebih dahulu (SUPER CEPAT)

            tickets.forEach((tiket, index) => {
                const rawFlagHvc = tiket.FLAG_HVC || tiket['FLAG HVC'] || tiket.FLAGHVC || tiket.PRIORITAS || '';

                let hvcBadge = `<span class="text-slate-400">-</span>`;
                if (strHvc && strHvc !== '-' && strHvc !== '0' && strHvc.toUpperCase() !== 'NO' && strHvc.toUpperCase() !== 'FALSE') {
                    let badgeClass = "bg-slate-100 text-slate-600 border-slate-200";
                    let sUp = strHvc.toUpperCase();
                    if (sUp.includes('DIAMOND') || sUp.includes('PLATINUM') || sUp.includes('GOLD') || sUp === 'YES') {
                        badgeClass = "bg-rose-100 text-rose-700 border-rose-200"; // Warna mencolok untuk pelanggan VIP
                    } else if (sUp.includes('SILVER') || sUp.includes('PRIORITY')) {
                        badgeClass = "bg-amber-100 text-amber-700 border-amber-200"; 
                    }
                    hvcBadge = `<span class="${badgeClass} text-[10px] font-bold px-2 py-0.5 rounded border whitespace-nowrap">${strHvc}</span>`;
                }
                
                const ticketText = Object.values(tiket).join(" ").toUpperCase();
                let matchedPriority = "";
                for (let p of PRIORITAS_TOP) { if (ticketText.includes(p)) { matchedPriority = p; break; } }
                
                const priorityBadge = matchedPriority ? `<div class="mt-1.5"><span class="bg-purple-100 text-purple-700 text-[10px] font-bold px-2 py-1 rounded shadow-sm whitespace-nowrap"><i class="fas fa-arrow-up mr-1"></i>${matchedPriority}</span></div>` : '';
                const bgClass = matchedPriority ? "bg-purple-50/20" : "";

                // Ambil referensi ke Datalist yang sudah di-pre-render
                const datalistId = getDatalistId(tiket.NAMA_SHEET);
                const hasTeknisi = datalistId !== null;
                const inputState = hasTeknisi ? "" : "disabled";
                const inputPlaceholder = hasTeknisi ? "Ketik/Pilih Teknisi..." : "Tidak ada data";

                const idSelect1 = `t1_${index}`;
                const idSelect2 = `t2_${index}`;
                const idBtnSubmit = `btn_${index}`;

                // Ambil field No Tiket dengan aman agar bisa dirender meskipun nama kolomnya "NO TIKET" (pakai spasi)
                const displayNoTiket = tiket.NO_TIKET || tiket['NO TIKET'] || tiket.NOTIKET || tiket.INCIDENT || '-';

                rowsHtmlContent += `
                    <tr class="hover:bg-blue-50/50 transition-colors group ${bgClass}">
                        <td class="px-4 py-3 font-bold text-slate-800 align-top pt-4">${displayNoTiket}${priorityBadge}</td>
                        <td class="px-4 py-3 text-xs font-semibold text-blue-600 bg-blue-50/30 align-top pt-4">${tiket.NAMA_SHEET || '-'}</td>
                        <td class="px-4 py-3 align-top pt-4">${tiket.SEKTOR || '-'}</td>
                        <td class="px-4 py-3 align-top pt-4">${tiket.STO || '-'}</td>
                        <td class="px-4 py-3 truncate max-w-[150px] align-top pt-4" title="${tiket.CUST_ASSIGN || ''}">${tiket.CUST_ASSIGN || '-'}</td>
                        <td class="px-4 py-3 align-top pt-4">${hvcBadge}</td>
                        <td class="px-4 py-3 truncate max-w-[150px] align-top pt-4" title="${tiket.DATEK || ''}">${tiket.DATEK || '-'}</td>
                        <td class="px-4 py-3 align-top pt-4">${tiket.NO_JASTEL || '-'}</td>
                        <td class="px-4 py-2 align-top pt-3"><input type="text" id="${idSelect1}" list="${datalistId || ''}" ${inputState} placeholder="${inputPlaceholder}" autocomplete="off" oninput="markEditing()" onfocus="markEditing()" class="w-56 text-xs px-2 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm disabled:bg-slate-100"></td>
                        <td class="px-4 py-2 align-top pt-3"><input type="text" id="${idSelect2}" list="${datalistId || ''}" ${inputState} placeholder="${inputPlaceholder} (Opsional)" autocomplete="off" oninput="markEditing()" onfocus="markEditing()" class="w-56 text-xs px-2 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm disabled:bg-slate-100"></td>
                        <td class="px-4 py-2 text-center sticky right-0 bg-white group-hover:bg-blue-50/90 shadow-[-4px_0_6px_rgba(0,0,0,0.02)] border-l border-slate-100 align-top pt-3">
                            <button id="${idBtnSubmit}" onclick="submitRowUpdate('${tiket.NAMA_SHEET}', ${tiket.ROW_NUMBER}, '${idSelect1}', '${idSelect2}', '${idBtnSubmit}')" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded flex items-center gap-1 mx-auto whitespace-nowrap shadow-sm"><i class="fas fa-save"></i> Simpan</button>
                        </td>
                    </tr>
                `;
            });
            
            // Masukkan seluruh baris ke HTML secara instan (1 kali operasi DOM)
            tableBody.innerHTML = rowsHtmlContent;
        }

        async function submitRowUpdate(sheet, rowNum, select1Id, select2Id, btnId) {
            const valT1 = document.getElementById(select1Id).value.trim();
            const valT2 = document.getElementById(select2Id).value.trim();
            if (!valT1) { alert('Silakan ketik/pilih Teknisi 1 terlebih dahulu!'); return; }

            const datalistId = getDatalistId(sheet);
            const validTeknisiList = DB_TEKNISI[datalistId ? datalistId.replace('dl_', '') : ""] || [];
            
            if (validTeknisiList.length > 0) {
                if (!validTeknisiList.includes(valT1)) { alert('Nama Teknisi 1 tidak valid!'); document.getElementById(select1Id).focus(); return; }
                if (valT2 && !validTeknisiList.includes(valT2)) { alert('Nama Teknisi 2 tidak valid!'); document.getElementById(select2Id).focus(); return; }
            }

            const url = apiUrlInput.value.trim();
            const btn = document.getElementById(btnId);
            const originalBtnHtml = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="loader loader-sm mr-1"></div> Menyimpan...`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            const payload = { namaSheet: sheet, rowNumber: parseInt(rowNum), teknisi1: valT1, teknisi2: valT2 };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.status === 'success') {
                    btn.classList.replace('bg-blue-600', 'bg-green-500');
                    btn.classList.replace('hover:bg-blue-700', 'hover:bg-green-600');
                    btn.innerHTML = `<i class="fas fa-check"></i> Sukses`;
                    clearEditingState();
                    setTimeout(() => fetchTickets(true), 1000); 
                } else {
                    alert('Gagal menyimpan: ' + result.message); resetButton(btn, originalBtnHtml);
                }
            } catch (error) { alert('Terjadi kesalahan jaringan.'); resetButton(btn, originalBtnHtml); }
        }

        function resetButton(btn, originalHtml) { btn.disabled = false; btn.innerHTML = originalHtml; btn.classList.remove('opacity-75', 'cursor-not-allowed'); }
        function markEditing() { isEditingTableRow = true; updateCountdownText(); }
        function clearEditingState() { isEditingTableRow = false; updateCountdownText(); }
        
        // Deteksi jika user klik di luar form input, matikan mode editing
        document.addEventListener('click', function(event) { 
            if (!tableContainer.contains(event.target) && isEditingTableRow) clearEditingState(); 
        });

        function toggleRealTime() {
            isRealTime = document.getElementById('realtimeToggle').checked;
            if(isRealTime) { startPolling(); if(tableBody.innerHTML === '') fetchTickets(); } else { stopPolling(); }
        }

        function startPolling() {
            secondsLeft = 15; updateCountdownText();
            countdownId = setInterval(() => {
                if (!isEditingTableRow) { 
                    secondsLeft--;
                    if(secondsLeft <= 0) { fetchTickets(true); secondsLeft = 15; }
                    updateCountdownText();
                }
            }, 1000);
        }

        function stopPolling() { clearInterval(countdownId); document.getElementById('countdownText').textContent = ""; }
        function updateCountdownText() { document.getElementById('countdownText').textContent = isEditingTableRow ? "(Menunggu Anda)" : `(${secondsLeft}s)`; }

    </script>

<script>
    // Backend API
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycby3xJxVLmEWmlEox69yCCVB44PiZbfCRg3GHOECC5D8DYg1-NLO6SXhLoqUoxsZ2KQ/exec';
    const LOGIN_TOKEN_KEY = 'dashboard_login_token';

    async function apiRequest(payload) {
        const res = await fetch(BACKEND_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });
        return await res.json();
    }

    async function backendGetCsv(sheetName) {
        const token = localStorage.getItem(LOGIN_TOKEN_KEY) || '';
        return await apiRequest({ action: 'getCsv', token, sheet: sheetName });
    }

    // Urutan STO untuk mapping
    const stoOrder = [
        'ARK', 'UBT', 'BKN', 'PPN', 'BKR', 'SEA', 'SAK', 'SGP',
        'DUM', 'BGU', 'DRI', 'BAG', 'BAS', 'UJT', 'SLJ',
        'TAK', 'RGT', 'AMK', 'TBH', 'PMB', 'KLE', 'PNP', 'BLS',
        'PKR', 'MIS', 'SOK', 'PWG', 'RBI',
        'PBRC 1', 'PBRC 2', 'PBRC 3', 'PBRC 4'
    ];

    // Mapping STO ke Area
    const areas = {
        'arengka': { span: 1, stos: ['ARK'] },
        'bukitraya': { span: 7, stos: ['UBT', 'BKN', 'PPN', 'BKR', 'SEA', 'SAK', 'SGP'] },
        'dumai': { span: 7, stos: ['DUM', 'BGU', 'DRI', 'BAG', 'BAS', 'UJT', 'SLJ'] },
        'rengat': { span: 8, stos: ['TAK', 'RGT', 'AMK', 'TBH', 'PMB', 'KLE', 'PNP', 'BLS'] },
        'kerinci': { span: 5, stos: ['PKR', 'MIS', 'SOK', 'PWG', 'RBI'] },
        'pbr_barat': { span: 2, stos: ['PBRC 1', 'PBRC 2'] },
        'pbr_timur': { span: 2, stos: ['PBRC 3', 'PBRC 4'] }
    };

    // Waktu Realtime
    let clockInterval;
    function updateClock(statusText = "") {
        const now = new Date();
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const day = now.getDate();
        const month = months[now.getMonth()];
        const year = now.getFullYear();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        const timeString = `ANALISA PENYEBAB GANGGUAN | ${day} ${month} ${year} | ${hours}:${minutes}:${seconds} WIB`;
        
        if (statusText) {
            document.getElementById('real-time-header').innerHTML = `${timeString} <span class="loading-text">(${statusText})</span>`;
        } else {
            document.getElementById('real-time-header').textContent = timeString;
        }
    }

    // CSV Parser sederhana
    function parseCSV(str) {
        const arr = [];
        let quote = false;
        for (let row = 0, col = 0, c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    let isLoadingData = false;
    let lastSuccessLoad = 0;

    async function loadDataFromGoogleSheets(force = false) {
        // PERBAIKAN: Ubah pengecekan aktif tab menjadi app3 (Analisa Penyebab Gangguan)
        if (window.parent && window.parent.__activeTab && window.parent.__activeTab !== 'app3') return;
        if (isLoadingData) return;
        if (!force && lastSuccessLoad && (Date.now() - lastSuccessLoad) < 15000) return;

        isLoadingData = true;
        clearInterval(clockInterval);
        updateClock("Sinkronisasi Data...");

        try {
            const response = await backendGetCsv('ALL TIKET');
            if (!response || !response.success || !response.csv) throw new Error(response?.error || 'Network response was not ok');
            const csvText = response.csv;

            const data = parseCSV(csvText);
            processData(data);

            // Menjalankan jam kembali setelah sukses
            lastSuccessLoad = Date.now();
            clockInterval = setInterval(() => updateClock(), 1000);
            updateClock(); 

        } catch (error) {
            console.error("Gagal mengambil data:", error);
            document.getElementById('table-body').innerHTML = `<tr><td colspan="34" style="padding: 30px; color: red; background: #fee2e2;"><b>Gagal menghubungkan ke backend.</b><br>Pastikan login sudah benar dan backend Apps Script aktif.</td></tr>`;
        } finally {
            isLoadingData = false;
        }
    }

    function processData(data) {
        const counts = {}; // Menyimpan hitungan penyebab -> STO
        const stoTotals = {}; // Total per STO
        let grandTotal = 0;

        // Inisialisasi STO
        stoOrder.forEach(sto => stoTotals[sto] = 0);

        // Parsing baris per baris (mulai dari 1 untuk melewati header)
        for(let i = 1; i < data.length; i++) {
            const row = data[i];
            
            // Kolom B (index 1) = SEKTOR, Kolom C (index 2) = STO, Kolom AA (index 26) = ANALISA
            if(!row || row.length < 27) continue; 
            
            let stoRaw = row[2] ? row[2].trim().toUpperCase() : "";
            const sektorRaw = row[1] ? row[1].trim().toUpperCase() : "";
            const penyebab = row[26] ? row[26].trim().toUpperCase() : "";

            // LOGIKA KHUSUS PEKANBARU (PBRC 1 - 4): Ambil dari Kolom SEKTOR
            const cleanSek = sektorRaw.replace(/\s/g, '');
            if (cleanSek.includes('PBRC1') || cleanSek.includes('PBB1')) stoRaw = 'PBRC 1';
            else if (cleanSek.includes('PBRC2') || cleanSek.includes('PBB2')) stoRaw = 'PBRC 2';
            else if (cleanSek.includes('PBRC3') || cleanSek.includes('PBB3')) stoRaw = 'PBRC 3';
            else if (cleanSek.includes('PBRC4') || cleanSek.includes('PBB4')) stoRaw = 'PBRC 4';

            if(stoRaw && penyebab) {
                // Catat ke dalam matrix jika STO dikenali di kolom kita
                if (stoTotals[stoRaw] !== undefined) {
                    if(!counts[penyebab]) counts[penyebab] = {};
                    if(!counts[penyebab][stoRaw]) counts[penyebab][stoRaw] = 0;
                    
                    counts[penyebab][stoRaw]++;
                    stoTotals[stoRaw]++;
                    grandTotal++;
                }
            }
        }

        renderDashboard(counts, stoTotals, grandTotal);
    }

    function renderDashboard(counts, stoTotals, grandTotal) {
        // 1. Render Baris Total STO
        const rowTotalSto = document.getElementById('row-total-sto');
        rowTotalSto.innerHTML = '';
        stoOrder.forEach(sto => {
            const td = document.createElement('td');
            td.textContent = stoTotals[sto];
            rowTotalSto.appendChild(td);
        });
        const tdGrandSto = document.createElement('td');
        tdGrandSto.textContent = grandTotal;
        rowTotalSto.appendChild(tdGrandSto);

        // 2. Render Baris Total AREA
        const rowTotalArea = document.getElementById('row-total-area');
        rowTotalArea.innerHTML = '<td class="sticky-col" style="background-color: #64748b; color: white;">TOTAL / AREA</td>';
        
        for (const [areaName, areaData] of Object.entries(areas)) {
            let sumArea = 0;
            areaData.stos.forEach(s => sumArea += stoTotals[s]);
            
            const td = document.createElement('td');
            td.colSpan = areaData.span;
            td.textContent = sumArea;
            rowTotalArea.appendChild(td);
        }
        const tdGrandArea = document.createElement('td');
        tdGrandArea.textContent = grandTotal;
        rowTotalArea.appendChild(tdGrandArea);

        // 3. Render Body Penyebab
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        // Urutkan alfabetis penyebabnya
        const causes = Object.keys(counts).sort();

        causes.forEach(cause => {
            const tr = document.createElement('tr');
            
            // Kolom Nama Penyebab
            const tdCause = document.createElement('td');
            tdCause.className = 'sticky-col';
            tdCause.textContent = cause;
            tr.appendChild(tdCause);

            let rowTotal = 0;

            // Kolom per STO
            stoOrder.forEach(sto => {
                const td = document.createElement('td');
                const val = counts[cause][sto] || 0;
                
                if(val > 0) {
                    td.textContent = val;
                    rowTotal += val;
                    // Logic Heatmap CSS
                    if(val >= 10) td.className = 'heat-3';
                    else if(val >= 4) td.className = 'heat-2';
                    else td.className = 'heat-1';
                }
                tr.appendChild(td);
            });

            // Kolom Total Baris tersebut
            const tdTotal = document.createElement('td');
            tdTotal.textContent = rowTotal;
            tdTotal.style.fontWeight = 'bold';
            
            // Heatmap untuk kolom total
            if(rowTotal >= 20) tdTotal.className = 'heat-3';
            else if(rowTotal >= 10) tdTotal.className = 'heat-2';
            else if(rowTotal > 0) tdTotal.className = 'heat-1';
            
            tr.appendChild(tdTotal);
            tbody.appendChild(tr);
        });

        // Baris "Kehadiran Teknisi" manual telah dihapus dari sini
    }

    // Inisialisasi awal
    updateClock("Memulai...");
    
    // Jalankan fungsi fetch data pertama kali
    loadDataFromGoogleSheets();

    // Auto-refresh data dari GDocs setiap 1 menit (60000 ms)
    setInterval(() => loadDataFromGoogleSheets(false), 60000);

</script>

</body>
